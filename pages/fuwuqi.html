<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽 · 服务器互通查询</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 820px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }

        .card {
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .search-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-row input {
            flex: 1;
            min-width: 140px;
            padding: 8px 12px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-row input:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
        }
        .search-row input::placeholder {
            color: #5a6a7e;
        }
        .search-row select {
            padding: 8px 10px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            min-width: 100px;
        }
        .search-row select:focus {
            border-color: #c8a96e;
        }
        .search-row .btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-row .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(200, 169, 110, 0.25);
        }
        .search-row .btn:active {
            transform: scale(0.97);
        }
        .search-row .btn-reset {
            background: #2a3a4a;
            color: #e0e6ed;
        }
        .search-row .btn-reset:hover {
            background: #3a4a5a;
        }

        .stats {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .stats .item {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 4px 12px;
            text-align: center;
            flex: 1;
            min-width: 60px;
        }
        .stats .item .l {
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stats .item .v {
            font-size: 16px;
            font-weight: 700;
            color: #f6d365;
        }
        .stats .item .v.g {
            color: #5fcb9a;
        }

        .group-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 16px;
            font-weight: 700;
            color: #c8a96e;
            padding: 6px 0 4px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 6px;
            margin-bottom: 10px;
        }
        .tag-grid .tag {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 12px;
            color: #d0d8e0;
            transition: 0.2s;
            cursor: default;
            white-space: nowrap;
        }
        .tag-grid .tag:hover {
            border-color: #c8a96e;
            background: rgba(200, 169, 110, 0.06);
        }
        .tag-grid .tag.highlight {
            border-color: #c8a96e;
            background: rgba(200, 169, 110, 0.12);
            color: #f6d365;
            font-weight: 600;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 20px 0;
            font-size: 14px;
        }
        .no-result .icon {
            font-size: 30px;
            display: block;
            margin-bottom: 6px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .search-row input {
                font-size: 13px;
                padding: 6px 10px;
                min-width: 100px;
            }
            .search-row select {
                font-size: 12px;
                padding: 6px 8px;
                min-width: 80px;
            }
            .search-row .btn {
                font-size: 13px;
                padding: 6px 14px;
            }
            .tag-grid .tag {
                font-size: 11px;
                padding: 2px 8px;
            }
            .group-title {
                font-size: 14px;
            }
            .stats .item .v {
                font-size: 14px;
            }
        }
        @media (max-width: 380px) {
            .search-row input {
                font-size: 12px;
                min-width: 70px;
            }
            .search-row select {
                font-size: 11px;
                min-width: 60px;
            }
            .tag-grid .tag {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">

        <div class="header">
            <img src="images/douyintouxiang.png" alt="头像">
            <h1>⚔️ 服务器互通查询</h1>
            <span class="sub">暗黑不朽 · 四大互通</span>
        </div>

        <div class="card">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="🔍 搜索服务器名称..." oninput="filter()">
                <select id="groupFilter" onchange="filter()">
                    <option value="">全部互通</option>
                    <option value="1">第一大互通</option>
                    <option value="2">第二大互通</option>
                    <option value="3">第三大互通</option>
                    <option value="4">第四大互通</option>
                </select>
                <button class="btn" onclick="filter()">查询</button>
                <button class="btn btn-reset" onclick="resetFilter()">重置</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="item"><div class="l">总服务器</div><div class="v" id="totalCount">0</div></div>
            <div class="item"><div class="l">当前显示</div><div class="v g" id="showCount">0</div></div>
            <div class="item"><div class="l">互通分组</div><div class="v" id="groupCount">0</div></div>
        </div>

        <div class="card" id="resultCard">
            <div id="resultContainer"></div>
        </div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不朽百宝箱</a>
    </div>

    <script>
        // ================================================================
        //  数据（根据最新截图重新整理）
        //  每个服务器名称独立，不连在一起
        // ================================================================

        var SERVER_DATA = {
            1: {
                name: '第一大互通',
                servers: [
                    // 庇护之地
                    '瓦西里，'扎卡', '奥玛斯'，'萨普提', '艾德莉亚'，'佐夫', '纳德尔'，'桑德罗'，'耶尔辛', '最后的遗迹'，'图尔·杜拉',
                    // 世界之石
                    '罗达门特'，'布尔凯索', '马诺克'，'乌尔', '阿兹莫丹'，'格雷兹', '上古之人', '维塔特'，'都瑞尔', '拉克蕊'，'塔西', '拉萨尔'，'卡珊',
                    '艾库拉斯卡辛',
                    // '维兹贾塔'，'德拉维克'，'瑞肯'
                    '伊尔尼娜',
                    // 巴尔
                    '原罪之战', '黑暗流放', '伊拉图斯', '阿克巴', '佐敦·库勒', '熔岩恶魔',
                    '瓦瑞夫'，'吉德宾'，'佩金'，'沙蝎帮'，'贝德威'，'衣尔尔'，'马拉',
                    // 毁灭新生
                    '光明之海', '维塔亚'，'失乐园', '水晶穹顶', '暗潮突围',
                    // 2025蛇年大吉
                    '铁血硬汉'
                ]
            },
            2: {
                name: '第二大互通',
                servers: [
                    '泰瑞尔', '钓鱼大师', '墨菲斯托', '欧萨', '周年喜剧剧', '王朝盛典', '弗拉维', '一剑逍遥', '盲目之眼',
                    '艾苏', '暗黑蚀刻',
                    '伊纳瑞斯', '凯奥', '昂戈力', '无言者', '雷吉希斯', '戈尔哥西亚', '女伯爵', '珀斯', '瑟瑟',
                    '奎尔·艾利克斯',
                    '奥科', '安达莉尔', '法希尔', '卡林姆的意志', '娜塔亚', '蓬', '怀特', '赫拉迪姆', '埃拉诺克',
                    '赫穆里尔', '塔布兹',
                    '伊瑟瑞尔', '瓦托斯', '格里斯沃尔德', '库伊莱', '莱斯', '罗德里', '吉斯', '马萨伊尔', '混沌巫师',
                    '梅席夫',
                    '哈德瑞尔', '雷山德', '拉扎鲁斯', '法锤', '伊莎瑞尔', '塔杜拉斯', '法恩汉', '贸易联合会', '凯伦'
                ]
            },
            3: {
                name: '第三大互通',
                servers: [
                    '天使议会', '玛瑞斯', '亚瑞特之巅', '卡迪乌斯', '艾格尼', '奥莉尔', '拉苏克', '奥格登', '托拉然',
                    '迪卡德·凯恩', '赞艾苏', '琥珀之刃', '艾伯莱希特', '恶魔树人', '基德', '伊娜', '贾巴德', '卡巴拉克西斯',
                    '祖尔', '拉约克', '血玫瑰', '沙铎克斯', '克里斯托弗', '法拉', '圣光大教堂', '血鸦', '灵魂石',
                    '阿斯卡利', '安达隆', '伊本·法哈德', '贾梅拉', '乔森', '地狱铁砧', '吉库尔', '大馆长', '狂骑士',
                    '戴德萨', '维兹杰雷', '赛斯切隆', '诺·提拉吉', '彼列', '安雅', '神秘避难所', '纳马力', '阿卡拉',
                    '阿西拉', '乔丹之石', '地狱魔匣', '卓格楠', '扎伊姆', '霍拉松', '魔塔纷争', '恐惧之王',
                    '冰封王座（魔兽联动）', '雾刃', '龙·2024'
                ]
            },
            4: {
                name: '第四大互通',
                servers: [
                    '莉莉丝', '圣剑之光', '哈尔布', '塔·拉夏', '寻道者', '爆金狂潮', '卡夏', '阿特玛', '拉斯玛',
                    '萨戈斯', '恰西', '贝拉席尔', '屠夫', '三魔神', '米卡伊尔', '杰瑞德·凯恩', '塔尔瓦·银舌',
                    '卡德山', '艾吉斯', '尼芙尔', '赫拉铁力', '虚空', '英普瑞斯', '贝利', '巴图克', '伊塔',
                    '哈洛加斯', '源祖圣域', '吉利安', '乌雷', '斯卡恩', '恩奈德', '干燥平原', '安缪特', '永恒王冠',
                    '埃尔杜因', '李奥瑞克', '尼拉塞克', '艾斯卡拉', '灵魂虹吸', '燃冰之泪', '基恩塔克', '西里尔',
                    '夸尔凯克', '塞斯', '维拉', '鲁·高因', '基格列斯', '库拉斯特', '无主之地', '萨卡兰姆', '维兹郡',
                    '索格伦', '热血盛宴'
                ]
            }
        };

        // 构建全量服务器列表
        var ALL_SERVERS = [];
        for (var groupId in SERVER_DATA) {
            var group = SERVER_DATA[groupId];
            group.servers.forEach(function(name) {
                if (name && name.trim() !== '') {
                    ALL_SERVERS.push({
                        name: name.trim(),
                        groupId: groupId,
                        groupName: group.name
                    });
                }
            });
        }

        // ================================================================
        //  渲染
        // ================================================================

        function render(data) {
            var container = document.getElementById('resultContainer');
            var totalCount = document.getElementById('totalCount');
            var showCount = document.getElementById('showCount');
            var groupCount = document.getElementById('groupCount');

            var total = ALL_SERVERS.length;
            var showing = data.length;

            // 统计实际包含服务器的分组数
            var groups = {};
            data.forEach(function(item) {
                groups[item.groupId] = (groups[item.groupId] || 0) + 1;
            });
            var groupNum = Object.keys(groups).length;

            totalCount.textContent = total;
            showCount.textContent = showing;
            groupCount.textContent = groupNum;

            if (data.length === 0) {
                container.innerHTML = '<div class="no-result"><span class="icon">🔍</span>未找到匹配的服务器</div>';
                return;
            }

            // 按互通分组
            var grouped = {};
            data.forEach(function(item) {
                if (!grouped[item.groupId]) {
                    grouped[item.groupId] = {
                        name: item.groupName,
                        items: []
                    };
                }
                grouped[item.groupId].items.push(item.name);
            });

            var html = '';
            var groupIds = Object.keys(grouped).sort();

            groupIds.forEach(function(gid) {
                var g = grouped[gid];
                html += '<div class="group-title">⚔️ ' + g.name + '（' + g.items.length + ' 个）</div>';
                html += '<div class="tag-grid">';
                g.items.forEach(function(name) {
                    html += '<span class="tag">' + name + '</span>';
                });
                html += '</div>';
            });

            container.innerHTML = html;
        }

        // ================================================================
        //  筛选逻辑
        // ================================================================

        var currentFilter = {
            keyword: '',
            group: ''
        };

        function filter() {
            var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            var group = document.getElementById('groupFilter').value;

            currentFilter.keyword = keyword;
            currentFilter.group = group;

            var result = ALL_SERVERS.filter(function(item) {
                var matchKeyword = true;
                var matchGroup = true;

                if (keyword) {
                    matchKeyword = item.name.toLowerCase().indexOf(keyword) !== -1;
                }
                if (group) {
                    matchGroup = item.groupId === group;
                }
                return matchKeyword && matchGroup;
            });

            render(result);
        }

        function resetFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('groupFilter').value = '';
            currentFilter.keyword = '';
            currentFilter.group = '';
            render(ALL_SERVERS);
        }

        // ================================================================
        //  初始化
        // ================================================================

        window.onload = function() {
            render(ALL_SERVERS);
        };
    </script>
</body>
</html>
