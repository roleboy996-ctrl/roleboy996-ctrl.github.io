<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 赫拉迪姆遗志计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07090d;
            --bg-secondary: #151e27;
            --bg-card: rgba(14, 20, 29, 0.86);
            --border-color: rgba(52, 71, 90, 0.72);
            --border-glow: #d6b76f;
            --gold: #d6b76f;
            --gold-light: #f0c95a;
            --gold-gradient: linear-gradient(135deg, #d6b76f, #f0c95a);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 920px;
            width: 100%;
        }
        .main-panel {
            position: relative;
            padding: 18px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 30px;
            letter-spacing: 4px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 28px;
            height: 28px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(214, 183, 111, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }

        .material-block {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 16px;
        }
        .material-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .material-block .block-label {
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .block-label .color-a { color: #f0c95a; }
        .block-label .color-b { color: #6cb4ee; }
        .block-label .color-c { color: #b088d0; }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }
        .form-group {
            flex: 1 1 calc(50% - 20px);
            min-width: 120px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: #101922;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(214, 183, 111, 0.15);
        }
        .form-group select option {
            background: #182432;
        }

        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #070a0f;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 3px;
            margin-top: 8px;
            font-family: var(--font-display);
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(214, 183, 111, 0.35);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 6px;
        }
        .result-item {
            background: rgba(16, 25, 34, 0.96);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-item .value {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 4px;
        }
        .result-item .value.green {
            color: #61d6a3;
        }
        .result-item .value.blue {
            color: #6cb4ee;
        }
        .result-item .value.purple {
            color: #b088d0;
        }
        .result-item .sub-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .color-a { color: #f0c95a; }
        .color-b { color: #6cb4ee; }
        .color-c { color: #b088d0; }

        .info-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 14px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 18px auto 0;
            padding: 7px 14px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link::before {
            content: "←";
            color: var(--gold);
        }
        .back-link:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: var(--gold);
        }

        @media (max-width: 640px) {
            .form-group {
                flex: 1 1 100%;
            }
            .result-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .result-item .value {
                font-size: 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px 12px;
            }
            .main-panel {
                padding: 12px;
                border-radius: 14px;
            }
            .main-panel::before {
                left: 12px;
                right: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <h1>
                <svg class="page-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 9h16L12 4 4 9zM5 19h14M6 16h12M7 9v7M11 9v7M15 9v7M19 9v7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="title-text">赫拉迪姆遗志</span>
            </h1>
            <div class="sub">暗黑不灭 · 三种材料独立计算</div>
        </div>

        <div class="main-panel">
        <div class="card">

            <!-- 材料A -->
            <div class="material-block">
                <div class="block-label"><span class="color-a">■ 材料A</span></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前等级</label>
                        <select id="curA"></select>
                    </div>
                    <div class="form-group">
                        <label>目标等级</label>
                        <select id="tarA"></select>
                    </div>
                </div>
            </div>

            <!-- 材料B -->
            <div class="material-block">
                <div class="block-label"><span class="color-b">■ 材料B</span></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前等级</label>
                        <select id="curB"></select>
                    </div>
                    <div class="form-group">
                        <label>目标等级</label>
                        <select id="tarB"></select>
                    </div>
                </div>
            </div>

            <!-- 材料C -->
            <div class="material-block">
                <div class="block-label"><span class="color-c">■ 材料C</span></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前等级</label>
                        <select id="curC"></select>
                    </div>
                    <div class="form-group">
                        <label>目标等级</label>
                        <select id="tarC"></select>
                    </div>
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">计算升级消耗</button>

            <div id="resultArea" style="margin-top:20px; display:none;">
                <div class="result-grid">
                    <div class="result-item">
                        <div class="label">材料A</div>
                        <div class="value color-a" id="matA">0</div>
                        <div class="sub-text" id="rangeA">实际消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">材料B</div>
                        <div class="value color-b" id="matB">0</div>
                        <div class="sub-text" id="rangeB">实际消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">材料C</div>
                        <div class="value color-c" id="matC">0</div>
                        <div class="sub-text" id="rangeC">实际消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">三种材料合计</div>
                        <div class="value green" id="totalMaterial">0</div>
                        <div class="sub-text">材料总数</div>
                    </div>
                </div>

                <div class="result-grid" style="margin-top:10px;">
                    <div class="result-item">
                        <div class="label">模拟天数</div>
                        <div class="value blue" id="days">0</div>
                        <div class="sub-text">约需 (天)</div>
                    </div>
                    <div class="result-item">
                        <div class="label">白金币花费</div>
                        <div class="value purple" id="goldCost">0</div>
                        <div class="sub-text">18,850 / 天</div>
                    </div>
                    <div class="result-item">
                        <div class="label">所需钥匙</div>
                        <div class="value" id="keys">0</div>
                        <div class="sub-text">377 把/天</div>
                    </div>
                    <div class="result-item">
                        <div class="label">总收益模拟</div>
                        <div class="value blue" id="totalGain">0</div>
                        <div class="sub-text">三种材料总获取</div>
                    </div>
                </div>

                <div class="info-note" id="infoNote">提示：每天可获取三种材料合计约 2250 份，消耗 377 把钥匙（18,850 白金币）。</div>
            </div>
        </div>

        <a href="../index.html" class="back-link">返回短脖子乔治</a>
        </div>
    </div>

    <script>
        // ================================================================
        //  数据
        // ================================================================
        var PER_LEVEL = [
            10, 30, 50, 70, 90, 110, 130, 150, 200,
            250, 300, 350, 400, 450, 500, 550, 600, 650, 700,
            800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1800,
            2000, 2200, 2400, 2600, 2800, 3000, 3200, 3400, 3600, 3800,
            4100, 4400, 4700, 5000, 5300, 5600, 5900, 6200, 6500, 7000,
            7500, 8000, 8500, 9000, 9500, 10000, 10500, 11000, 11500, 12000
        ];

        var CUMULATIVE = [0];
        for (var i = 0; i < PER_LEVEL.length; i++) {
            CUMULATIVE.push(CUMULATIVE[i] + PER_LEVEL[i]);
        }

        var DAILY_GAIN = 2250;
        var KEYS_PER_DAY = 377;
        var GOLD_PER_KEY = 50;
        var GOLD_PER_DAY = KEYS_PER_DAY * GOLD_PER_KEY;

        // ================================================================
        //  初始化下拉框（当前等级1-59，目标等级1-60）
        // ================================================================
        function initSelect(id, start, end, defaultVal) {
            var sel = document.getElementById(id);
            for (var lv = start; lv <= end; lv++) {
                var opt = document.createElement('option');
                opt.value = lv;
                opt.textContent = lv + ' 级';
                sel.appendChild(opt);
            }
            sel.value = defaultVal;
        }

        window.onload = function() {
            // 当前等级：1-59
            initSelect('curA', 1, 59, 1);
            initSelect('curB', 1, 59, 1);
            initSelect('curC', 1, 59, 1);
            // 目标等级：1-60（允许1级，即不升级）
            initSelect('tarA', 1, 60, 10);
            initSelect('tarB', 1, 60, 1);
            initSelect('tarC', 1, 60, 1);
            calculate();
        };

        // ================================================================
        //  计算单种材料消耗（允许 cur >= target 返回0）
        // ================================================================
        function calcSingle(cur, target) {
            if (cur >= target) return 0;
            return CUMULATIVE[target - 1] - CUMULATIVE[cur - 1];
        }

        // ================================================================
        //  核心计算
        // ================================================================
        function calculate() {
            var curA = parseInt(document.getElementById('curA').value);
            var tarA = parseInt(document.getElementById('tarA').value);
            var curB = parseInt(document.getElementById('curB').value);
            var tarB = parseInt(document.getElementById('tarB').value);
            var curC = parseInt(document.getElementById('curC').value);
            var tarC = parseInt(document.getElementById('tarC').value);

            var singleA = calcSingle(curA, tarA);
            var singleB = calcSingle(curB, tarB);
            var singleC = calcSingle(curC, tarC);
            var total = singleA + singleB + singleC;

            var days = Math.ceil(total / DAILY_GAIN);
            // 如果total=0，天数显示为0，而不是1
            if (total === 0) days = 0;
            var goldCost = days * GOLD_PER_DAY;
            var keys = days * KEYS_PER_DAY;
            var totalGain = days * DAILY_GAIN;

            document.getElementById('resultArea').style.display = 'block';

            document.getElementById('matA').textContent = singleA.toLocaleString();
            document.getElementById('matB').textContent = singleB.toLocaleString();
            document.getElementById('matC').textContent = singleC.toLocaleString();
            document.getElementById('totalMaterial').textContent = total.toLocaleString();

            document.getElementById('rangeA').textContent = curA + '→' + tarA + ' 消耗';
            document.getElementById('rangeB').textContent = curB + '→' + tarB + ' 消耗';
            document.getElementById('rangeC').textContent = curC + '→' + tarC + ' 消耗';

            document.getElementById('days').textContent = days;
            document.getElementById('goldCost').textContent = goldCost.toLocaleString();
            document.getElementById('keys').textContent = keys.toLocaleString();
            document.getElementById('totalGain').textContent = totalGain.toLocaleString();

            if (total === 0) {
                document.getElementById('infoNote').textContent =
                    '提示：三种材料均无需升级（当前等级 ≥ 目标等级），消耗为 0。';
            } else {
                document.getElementById('infoNote').textContent =
                    '提示：材料A (' + curA + '→' + tarA + ') 需 ' + singleA.toLocaleString() +
                    ' 份，材料B (' + curB + '→' + tarB + ') 需 ' + singleB.toLocaleString() +
                    ' 份，材料C (' + curC + '→' + tarC + ') 需 ' + singleC.toLocaleString() +
                    ' 份，合计 ' + total.toLocaleString() + ' 份。每日获取 ' + DAILY_GAIN +
                    ' 份，约需 ' + days + ' 天，消耗钥匙 ' + keys.toLocaleString() + ' 把，花费 ' +
                    goldCost.toLocaleString() + ' 白金币。';
            }
        }
    </script>
</body>
</html>
