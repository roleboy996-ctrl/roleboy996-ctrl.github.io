<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 小宝石升级计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07090d;
            --bg-secondary: #151e27;
            --bg-card: rgba(14, 20, 29, 0.86);
            --border-color: rgba(52, 71, 90, 0.72);
            --border-glow: #d6b76f;
            --gold: #d6b76f;
            --gold-light: #f0c95a;
            --gold-gradient: linear-gradient(135deg, #d6b76f, #f0c95a);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 880px;
            width: 100%;
        }
        .main-panel {
            position: relative;
            padding: 18px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 30px;
            letter-spacing: 4px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 28px;
            height: 28px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(214, 183, 111, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 calc(50% - 20px);
            min-width: 140px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #101922;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(214, 183, 111, 0.15);
        }
        .form-group select option {
            background: #182432;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #070a0f;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 3px;
            margin-top: 4px;
            font-family: var(--font-display);
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(214, 183, 111, 0.35);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 6px;
        }
        .result-item {
            background: rgba(16, 25, 34, 0.96);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-item .value {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 4px;
        }
        .result-item .value.green {
            color: #61d6a3;
        }
        .result-item .value.blue {
            color: #6cb4ee;
        }
        .result-item .value.purple {
            color: #b088d0;
        }
        .result-item .sub-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .table-wrap {
            overflow-x: auto;
            margin-top: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 450px;
        }
        th {
            background: #182432;
            color: var(--gold);
            font-weight: 600;
            padding: 12px 8px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            font-family: var(--font-display);
            letter-spacing: 1px;
        }
        td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(214, 183, 111, 0.05);
        }
        .highlight-row td {
            background: linear-gradient(90deg, rgba(143, 44, 44, 0.18), rgba(214, 183, 111, 0.08));
            font-weight: 600;
            border-bottom: 2px solid rgba(143, 44, 44, 0.75);
        }
        .info-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 14px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 18px auto 0;
            padding: 7px 14px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link::before {
            content: "←";
            color: var(--gold);
        }
        .back-link:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: var(--gold);
        }
        @media (max-width: 600px) {
            .form-group {
                flex: 1 1 100%;
            }
            .result-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .result-item .value {
                font-size: 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px 12px;
            }
            .main-panel {
                padding: 12px;
                border-radius: 14px;
            }
            .main-panel::before {
                left: 12px;
                right: 12px;
            }
            table {
                font-size: 12px;
                min-width: 320px;
            }
            td,
            th {
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <h1>
                <svg class="page-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6.5 4.5h11L21 9l-9 10L3 9l3.5-4.5z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
                    <path d="M3 9h18M8.2 9L12 19M15.8 9L12 19M8.2 9l2-4.5M15.8 9l-2-4.5" fill="none" stroke="currentColor" stroke-linejoin="round"/>
                </svg>
                <span class="title-text">小宝石升级</span>
            </h1>
            <div class="sub">暗黑不灭 · 消耗 &amp; 收益计算</div>
        </div>

        <div class="main-panel">
        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>宝石类型</label>
                    <select id="gemType">
                        <option value="base">黄玉</option>
                        <option value="base">蓝水晶</option>
                        <option value="base">月亮石</option>
                        <option value="base">猫眼石</option>
                        <option value="sun">太阳石</option>
                        <option value="red">赤精石</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>当前等级</label>
                    <select id="currentLevel">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标等级</label>
                    <select id="targetLevel">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10" selected>10</option>
                    </select>
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">计算升级消耗</button>

            <div id="resultArea" style="margin-top:20px; display:none;">
                <div class="result-grid">
                    <div class="result-item">
                        <div class="label">水晶石</div>
                        <div class="value" id="totalCrystal">0</div>
                        <div class="sub-text" id="crystalSub">实际消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">水晶石花费</div>
                        <div class="value green" id="crystalGold">0</div>
                        <div class="sub-text">500 白金币/个</div>
                    </div>
                    <div class="result-item">
                        <div class="label">小宝石</div>
                        <div class="value blue" id="totalGem">0</div>
                        <div class="sub-text" id="gemSub">实际消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">小宝石花费</div>
                        <div class="value purple" id="gemGold">0</div>
                        <div class="sub-text">50 白金币/个</div>
                    </div>
                </div>

                <div class="result-grid" style="margin-top:10px;">
                    <div class="result-item" style="grid-column: span 2;">
                        <div class="label">总花费</div>
                        <div class="value" id="totalGold">0</div>
                        <div class="sub-text">白金币</div>
                    </div>
                    <div class="result-item" style="grid-column: span 2;">
                        <div class="label">属性收益</div>
                        <div class="value blue" id="totalStat">+0</div>
                        <div class="sub-text" id="statLabel">属性增长</div>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>升级区间</th>
                                <th>水晶石</th>
                                <th>累计水晶石</th>
                                <th>小宝石</th>
                                <th>属性值</th>
                            </tr>
                        </thead>
                        <tbody id="detailTableBody"></tbody>
                    </table>
                </div>
                <div class="info-note" id="infoNote">提示：1~4级升级不需要水晶石，5级起每级消耗递增。</div>
            </div>
        </div>

        <a href="../index.html" class="back-link">返回短脖子乔治</a>
        </div>
    </div>

    <script>
        // ================================================================
        //  数据区（最终确认）
        // ================================================================

        // 宝石属性值：索引0=1级, 索引9=10级
        var STATS = {
            base: [8, 16, 24, 36, 56, 136, 368, 656, 952, 1256],
            sun: [8, 16, 32, 56, 92, 148, 216, 292, 380, 480],
            red: [80, 160, 320, 560, 920, 1480, 2160, 2920, 3800, 4800]
        };

        // 水晶石单级消耗 (索引0:1→2, 索引8:9→10)
        var CRYSTAL_PER = [0, 0, 0, 0, 1, 5, 15, 35, 75];

        // 水晶石累计消耗（至该等级）：索引0=1级, 索引9=10级
        // 按递推公式：累计(当前级) = 单级 + 3 × 上一级累计
        var CRYSTAL_CUM = [];
        for (var i = 0; i < 10; i++) {
            if (i < 5) {
                CRYSTAL_CUM[i] = 0;
            } else if (i === 5) {
                CRYSTAL_CUM[i] = 1;
            } else {
                CRYSTAL_CUM[i] = CRYSTAL_PER[i - 1] + 3 * CRYSTAL_CUM[i - 1];
            }
        }
        // CRYSTAL_CUM = [0, 0, 0, 0, 0, 1, 8, 39, 152, 531]

        // 小宝石累计消耗（至该等级）：索引0=1级, 索引9=10级
        // 这些数字本身就是累计值，不是单级消耗
        var GEM_CUM = [0, 3, 9, 27, 81, 243, 729, 2187, 6561, 19683];

        // 价格
        var CRYSTAL_PRICE = 500;
        var GEM_PRICE = 50;

        var GEM_NAME = {
            base: '黄玉/蓝水晶/月亮石/猫眼石',
            sun: '太阳石',
            red: '赤精石'
        };

        // ================================================================
        //  核心计算（最终确认规则）
        // ================================================================

        function calculate() {
            var gemKey = document.getElementById('gemType').value;
            var cur = parseInt(document.getElementById('currentLevel').value);
            var target = parseInt(document.getElementById('targetLevel').value);

            if (cur >= target) {
                alert('目标等级必须大于当前等级！');
                return;
            }

            var stats = STATS[gemKey];
            var name = GEM_NAME[gemKey];

            // ----- 1. 水晶石实际消耗 -----
            // 规则：Σ 单级 × 3^(target - lv - 1)，lv 从 cur 到 target-1
            var crystalActual = 0;
            for (var lv = cur; lv < target; lv++) {
                var idx = lv - 1;
                var single = CRYSTAL_PER[idx] || 0;
                var exponent = target - lv - 1;
                var multiplier = Math.pow(3, exponent);
                crystalActual += single * multiplier;
            }

            // ----- 2. 小宝石实际消耗 -----
            // 规则：累计值相减
            var gemActual = GEM_CUM[target - 1] - GEM_CUM[cur - 1];

            // ----- 3. 价格计算 -----
            var crystalGold = crystalActual * CRYSTAL_PRICE;
            var gemGold = gemActual * GEM_PRICE;
            var totalGold = crystalGold + gemGold;

            // ----- 4. 属性收益 -----
            var curStat = stats[cur - 1] || 0;
            var tarStat = stats[target - 1] || 0;
            var statGain = tarStat - curStat;

            // ----- 5. 明细行（从当前到目标的所有区间）-----
            var rows = [];
            for (var lv = cur; lv < target; lv++) {
                var idx = lv - 1;
                var c = CRYSTAL_PER[idx] || 0;
                var cumC = CRYSTAL_CUM[lv] || 0;
                var g = GEM_CUM[lv] || 0; // 该级对应的累计小宝石（升级后到达 lv+1 级的累计）
                // 但表格里小宝石列显示的是单级？还是累计？这里按你截图显示单级消耗
                // 实际上GEM_CUM是累计值，但截图里显示的是单级消耗(3,9,27...)
                // 所以需要反推单级：单级 = 当前级累计 - 上一级累计
                var gemSingle = GEM_CUM[lv] - GEM_CUM[lv - 1] || 0;
                rows.push({
                    from: lv,
                    to: lv + 1,
                    crystal: c,
                    crystalCum: cumC,
                    gem: gemSingle,
                    stat: stats[lv] || 0
                });
            }

            // ---- 渲染结果卡片 ----
            document.getElementById('resultArea').style.display = 'block';

            document.getElementById('totalCrystal').textContent = crystalActual.toLocaleString();
            document.getElementById('crystalGold').textContent = crystalGold.toLocaleString();
            document.getElementById('totalGem').textContent = gemActual.toLocaleString();
            document.getElementById('gemGold').textContent = gemGold.toLocaleString();
            document.getElementById('totalGold').textContent = totalGold.toLocaleString();
            document.getElementById('totalStat').textContent = (statGain >= 0 ? '+' : '') + statGain.toLocaleString();
            document.getElementById('statLabel').textContent = name + ' 属性增长';

            document.getElementById('crystalSub').textContent = cur + '→' + target + ' 实际消耗';
            document.getElementById('gemSub').textContent = cur + '→' + target + ' 实际消耗';

            // ---- 渲染表格 ----
            var tbody = document.getElementById('detailTableBody');
            tbody.innerHTML = '';
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var tr = document.createElement('tr');
                if (i === rows.length - 1) {
                    tr.className = 'highlight-row';
                }
                tr.innerHTML =
                    '<td>' + r.from + ' → ' + r.to + '</td>' +
                    '<td>' + r.crystal + '</td>' +
                    '<td>' + r.crystalCum.toLocaleString() + '</td>' +
                    '<td>' + r.gem.toLocaleString() + '</td>' +
                    '<td>' + r.stat.toLocaleString() + '</td>';
                tbody.appendChild(tr);
            }

            document.getElementById('infoNote').textContent =
                '提示：从 ' + cur + ' 级升到 ' + target + ' 级，实际消耗 ' + crystalActual.toLocaleString() +
                ' 水晶石（' + crystalGold.toLocaleString() + ' 白金币）+ ' + gemActual.toLocaleString() +
                ' 小宝石（' + gemGold.toLocaleString() + ' 白金币），合计 ' + totalGold.toLocaleString() + ' 白金币。';
        }

        window.onload = calculate;
    </script>
</body>
</html>
