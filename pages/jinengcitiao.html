<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽百宝箱 · 职业技能词条</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #07090d;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 900px;
            width: 100%;
        }
        .main-panel {
            position: relative;
            padding: 14px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 16px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #26384a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .header h1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 22px;
            height: 22px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: linear-gradient(135deg, #f0c95a, #d6b76f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }

        .card {
            background: rgba(14, 20, 29, 0.86);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            align-items: flex-end;
        }
        .form-row .fg {
            flex: 1 1 auto;
            min-width: 120px;
            max-width: 200px;
        }
        .form-row .fg label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .form-row .fg select {
            width: 100%;
            padding: 8px 12px;
            background: #101922;
            border: 1px solid #26384a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            height: 38px;
        }
        .form-row .fg select:focus {
            border-color: #d6b76f;
        }
        .form-row .btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #d6b76f, #f0c95a);
            border: none;
            border-radius: 8px;
            color: #070a0f;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            height: 38px;
        }
        .form-row .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 14px rgba(214, 183, 111, 0.18);
        }

        /* ----- 统计 ----- */
        .stats {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .stats .item {
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 8px;
            padding: 4px 14px;
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .stats .item .l {
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stats .item .v {
            font-size: 18px;
            font-weight: 700;
            color: #f0c95a;
        }

        /* ===== 技能词条网格 ===== */
        .skill-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .skill-item {
            background: rgba(16, 25, 34, 0.96);
            border: 1px solid #26384a;
            border-radius: 10px;
            padding: 10px 12px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .skill-item:hover {
            border-color: #d6b76f;
            background: linear-gradient(90deg, rgba(143, 44, 44, 0.16), rgba(16, 25, 34, 0.96) 36%);
            box-shadow: inset 3px 0 0 rgba(143, 44, 44, 0.95), 0 0 14px rgba(143, 44, 44, 0.16);
        }
        .skill-item .skill-name {
            font-size: 15px;
            font-weight: 600;
            color: #f0c95a;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .skill-item .skill-desc {
            font-size: 13px;
            color: #d0d8e0;
            line-height: 1.5;
        }
        .skill-item .skill-desc .highlight-number {
            color: #61d6a3;
            font-weight: 600;
        }
        .skill-item .skill-desc .empty-desc {
            color: #f87171;
            font-size: 12px;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 30px 0;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 12px auto 0;
            padding: 6px 12px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link::before {
            content: "←";
            color: #d6b76f;
        }
        .back-link:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: #d6b76f;
        }

        .info-note {
            font-size: 11px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #26384a;
            padding-top: 8px;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .skill-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .form-row .fg {
                min-width: 100px;
                max-width: 100%;
            }
            .form-row .fg select {
                font-size: 13px;
                height: 34px;
                padding: 6px 10px;
            }
            .form-row .btn {
                font-size: 13px;
                height: 34px;
                padding: 6px 16px;
            }
            .skill-item .skill-name {
                font-size: 14px;
            }
            .skill-item .skill-desc {
                font-size: 12px;
            }
            .stats .item .v {
                font-size: 16px;
            }
            .main-panel {
                padding: 10px;
                border-radius: 14px;
            }
            .main-panel::before {
                left: 12px;
                right: 12px;
            }
        }
        @media (max-width: 380px) {
            .skill-item .skill-name {
                font-size: 13px;
            }
            .skill-item .skill-desc {
                font-size: 11px;
            }
            .form-row .fg select {
                font-size: 12px;
                height: 30px;
            }
            .form-row .btn {
                font-size: 12px;
                height: 30px;
            }
        }
    </style>
</head>

        // 获取某职业的所有技能
        function getSkillsForClass(cls) {
            var skills = [];
            for (var key in SKILL_DESC) {
                if (key.startsWith(cls + '_')) {
                    var skillName = key.replace(cls + '_', '');
                    skills.push({
                        name: skillName,
                        desc: SKILL_DESC[key]
                    });
                }
            }
            // 按技能名称排序
            skills.sort(function(a, b) {
                return a.name.localeCompare(b.name);
            });
            return skills;
        }

        // 数字高亮函数
        function highlightNumbers(text) {
            if (!text) return text;
            return text.replace(/(\d+(?:\.\d+)?%?)/g, '<span class="highlight-number">$1</span>');
        }

        // ================================================================
        //  初始化与渲染
        // ================================================================

        window.onload = function() {
            var sel = document.getElementById('classSelect');
            CLASSES.forEach(function(cls) {
                var opt = document.createElement('option');
                opt.value = cls;
                opt.textContent = cls;
                sel.appendChild(opt);
            });
            // 默认选中圣教军
            sel.value = '圣教军';
            updateDisplay();
        };

        function updateDisplay() {
            var cls = document.getElementById('classSelect').value;
            var container = document.getElementById('resultContainer');
            var stats = document.getElementById('stats');

            if (!cls) {
                stats.style.display = 'none';
                container.innerHTML =
                    '<div style="text-align:center;color:#5a6a7e;padding:30px 0;font-size:14px;">' +
                    '<svg viewBox="0 0 24 24" aria-hidden="true" style="width:32px;height:32px;display:block;margin:0 auto 8px;color:#d6b76f;">' +
                    '<path d="M7 5.5A2.5 2.5 0 0 1 9.5 3H18v15.5A2.5 2.5 0 0 1 15.5 21H6a2 2 0 0 0 2-2V5.5z" fill="none" stroke="currentColor" stroke-linejoin="round"/>' +
                    '<path d="M6 21a2 2 0 0 1-2-2v-1h11.5M10 8h5M10 12h5M10 16h3" fill="none" stroke="currentColor" stroke-linecap="round"/>' +
                    '</svg>' +
                    '请选择一个职业查看词条' +
                    '</div>';
                return;
            }

            var skills = getSkillsForClass(cls);
            var total = skills.length;
            var descCount = 0;
            var missingCount = 0;

            skills.forEach(function(s) {
                if (s.desc) descCount++;
                else missingCount++;
            });

            stats.style.display = 'flex';
            document.getElementById('totalCount').textContent = total;
            document.getElementById('descCount').textContent = descCount;
            document.getElementById('missingCount').textContent = missingCount;

            if (skills.length === 0) {
                container.innerHTML = '<div class="no-result">该职业暂无词条数据</div>';
                return;
            }

            var html = '<div class="skill-grid">';
            skills.forEach(function(s) {
                html += '<div class="skill-item">';
                html += '<div class="skill-name">' + s.name + '</div>';
                html += '<div class="skill-desc">';
                if (s.desc) {
                    html += highlightNumbers(s.desc);
                } else {
                    html += '<span class="empty-desc">⚠️ 暂无描述</span>';
                }
                html += '</div>';
                html += '</div>';
            });
            html += '</div>';

            // 添加底部提示
            html += '<div class="info-note">共 ' + total + ' 个技能词条，' + descCount + ' 个已完善，' + missingCount +
                ' 个待补充</div>';

            container.innerHTML = html;
        }
    </script>
