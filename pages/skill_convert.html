<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法词条转换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #07090d;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 8px 6px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 1120px;
            width: 100%;
            margin: 0 auto;
        }
        .main-panel {
            position: relative;
            padding: 10px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }

        /* ----- 头部 ----- */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #26384a;
            margin-bottom: 8px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(214, 183, 111, 0.3);
        }
        .header h1 {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 18px;
            height: 18px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: linear-gradient(135deg, #f0c95a, #d6b76f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 10px;
            color: #7a8a9e;
            margin-left: 4px;
        }

        /* ----- 卡片 ----- */
        .card {
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 10px;
            padding: 8px 6px;
            margin-bottom: 8px;
        }

        /* ----- 表单 ----- */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 4px;
            align-items: center;
        }
        .form-row .fg {
            flex: 1 1 auto;
            min-width: 60px;
            max-width: 130px;
        }
        .form-row .fg label {
            display: block;
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .form-row .fg select {
            width: 100%;
            padding: 4px 6px;
            background: #101922;
            border: 1px solid #26384a;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            height: 30px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-row .fg select:focus {
            border-color: #d6b76f;
        }
        .form-row .btn {
            flex: 0 0 auto;
            padding: 4px 14px;
            background: linear-gradient(135deg, #d6b76f, #f0c95a);
            border: none;
            border-radius: 6px;
            color: #070a0f;
            font-weight: 700;
            font-size: 13px;
            height: 30px;
            cursor: pointer;
        }
        .form-row .hint {
            font-size: 9px;
            color: #5a6a7e;
            white-space: nowrap;
            line-height: 30px;
        }

        /* ----- 汇总 ----- */
        .summary {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .summary .item {
            flex: 1;
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 6px;
            padding: 4px 2px;
            text-align: center;
        }
        .summary .item .l {
            font-size: 8px;
            color: #7a8a9e;
        }
        .summary .item .v {
            font-size: 14px;
            font-weight: 700;
            color: #f0c95a;
        }
        .summary .item .v.g {
            color: #61d6a3;
        }

        /* ===== 左右两列网格 ===== */
        .slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .slot-section {
            background: rgba(16, 25, 34, 0.96);
            border: 1px solid #26384a;
            border-radius: 8px;
            padding: 6px 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .slot-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            font-size: 13px;
            font-weight: 600;
            color: #dfe8f2;
            margin-bottom: 6px;
            letter-spacing: 0;
        }
        .slot-title::before {
            content: "部位";
            color: #7a8a9e;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 1px 5px;
            border: 1px solid rgba(122, 138, 158, 0.28);
            border-radius: 999px;
            background: rgba(122, 138, 158, 0.08);
        }
        .skill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px solid #182432;
            font-size: 11px;
            transition: font-size 0.2s, background 0.2s;
        }
        .skill-row:last-child {
            border-bottom: none;
        }
        .skill-row .from-skill {
            color: #f0c95a;
            font-weight: 500;
        }
        .skill-row .to-skill {
            color: #6cb4ee;
            font-weight: 500;
        }
        .skill-row .arrow-icon {
            color: #4a5a6e;
            font-size: 10px;
            margin: 0 3px;
        }
        .slot-count {
            font-size: 10px;
            color: #5a6a7e;
            margin-top: 3px;
            padding-top: 3px;
            border-top: 1px dashed #26384a;
            text-align: right;
        }

        /* ===== 匹配部位高亮 ===== */
        .slot-section.matched {
            border-color: #d6b76f;
            background: linear-gradient(90deg, rgba(143, 44, 44, 0.18), rgba(16, 25, 34, 0.96) 34%);
            box-shadow: inset 3px 0 0 rgba(143, 44, 44, 0.95), 0 0 18px rgba(143, 44, 44, 0.16);
        }
        .slot-section.matched .slot-title {
            font-size: 15px;
            color: #f5f7fa;
        }
        .slot-section.matched .slot-title::before {
            color: #f0c95a;
            border-color: rgba(214, 183, 111, 0.45);
            background: rgba(214, 183, 111, 0.10);
        }
        .slot-section.matched .skill-row {
            font-size: 13px;
            padding: 3px 0;
            background: rgba(214, 183, 111, 0.06);
        }
        .slot-section.matched .skill-row .arrow-icon {
            font-size: 12px;
        }
        .slot-section.matched .slot-count {
            font-size: 11px;
            color: #d6b76f;
        }

        .slot-section.unmatched .slot-title {
            opacity: 0.6;
        }
        .slot-section.unmatched .skill-row {
            opacity: 0.5;
        }
        .slot-section.unmatched .slot-count {
            opacity: 0.4;
        }

        .skill-row.hidden {
            display: none;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 16px 0;
            font-size: 13px;
            grid-column: 1 / -1;
        }
        .info {
            font-size: 10px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #26384a;
            padding-top: 6px;
            margin-top: 6px;
        }
        .back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 10px auto 0;
            padding: 6px 12px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: #5a6a7e;
            font-size: 11px;
            text-decoration: none;
            transition: 0.2s;
        }
        .back::before {
            content: "←";
            color: #d6b76f;
        }
        .back:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: #d6b76f;
        }

        /* ----- 密码锁 ----- */
        .lock-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .lock-box .inner {
            background: rgba(17, 24, 33, 0.92);
            border: 1px solid #26384a;
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        .lock-box .inner h2 {
            color: #f0c95a;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .lock-box .inner p {
            color: #7a8a9e;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .lock-box .inner input {
            width: 100%;
            padding: 8px 12px;
            background: #101922;
            border: 1px solid #26384a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }
        .lock-box .inner input:focus {
            border-color: #d6b76f;
        }
        .lock-box .inner button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: linear-gradient(135deg, #d6b76f, #f0c95a);
            border: none;
            border-radius: 8px;
            color: #070a0f;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .lock-box .inner .err {
            color: #f87171;
            font-size: 12px;
            margin-top: 6px;
            min-height: 20px;
            opacity: 0;
        }

        /* ----- 手机端适配：调大选项方便点击 ----- */
        @media (max-width: 480px) {
            .main-panel {
                padding: 8px;
                border-radius: 12px;
            }
            .main-panel::before {
                left: 10px;
                right: 10px;
            }
            .form-row {
                gap: 8px 6px;
            }
            .form-row .fg {
                min-width: 70px;
                max-width: 140px;
            }
            .form-row .fg select {
                font-size: 14px;
                height: 34px;
                padding: 4px 8px;
            }
            .form-row .btn {
                font-size: 14px;
                height: 34px;
                padding: 4px 16px;
            }
            .form-row .hint {
                font-size: 10px;
                line-height: 34px;
            }

            .slot-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }
            .slot-section {
                padding: 4px 5px;
                border-radius: 6px;
            }
            .slot-title {
                font-size: 11px;
            }
            .skill-row {
                font-size: 9px;
                padding: 1px 0;
            }
            .skill-row .arrow-icon {
                font-size: 8px;
                margin: 0 2px;
            }
            .slot-count {
                font-size: 8px;
                margin-top: 2px;
                padding-top: 2px;
            }
            .slot-section.matched .slot-title {
                font-size: 13px;
            }
            .slot-section.matched .skill-row {
                font-size: 11px;
                padding: 2px 0;
            }
            .slot-section.matched .skill-row .arrow-icon {
                font-size: 10px;
            }
            .slot-section.matched .slot-count {
                font-size: 10px;
            }
            .summary .item .v {
                font-size: 12px;
            }
            .summary .item .l {
                font-size: 7px;
            }
        }

        @media (max-width: 380px) {
            .form-row .fg {
                min-width: 60px;
                max-width: 120px;
            }
            .form-row .fg select {
                font-size: 13px;
                height: 32px;
                padding: 3px 6px;
            }
            .form-row .btn {
                font-size: 13px;
                height: 32px;
                padding: 3px 12px;
            }
            .slot-grid {
                gap: 3px;
            }
            .slot-section {
                padding: 3px 4px;
            }
            .slot-title {
                font-size: 10px;
            }
            .skill-row {
                font-size: 8px;
                padding: 1px 0;
            }
            .slot-section.matched .slot-title {
                font-size: 12px;
            }
            .slot-section.matched .skill-row {
                font-size: 10px;
            }
        }
    </style>
</head>

        </div>
    </div>

    <div class="wrap">

        <div class="main-panel">
        <!-- 表单 -->
        <div class="card">
            <div class="form-row">
                <div class="fg"><label>当前</label><select id="classFrom" onchange="updateFrom()"></select></div>
                <div class="fg"><label>目标</label><select id="classTo" onchange="updateTo()"></select></div>
                <div class="fg"><label>当前技能</label><select id="skillFrom"><option value="">全部</option></select></div>

                <button class="btn" onclick="calc()">查询</button>
                <span class="hint">组合筛选</span>
            </div>
        </div>

        <!-- 结果 -->
        <div id="resultArea" style="display:none;">
            <div class="summary">
                <div class="item"><div class="l">部位</div><div class="v" id="totalSlots">0</div></div>
                <div class="item"><div class="l">匹配部位</div><div class="v g" id="matchedSlots">0</div></div>
                <div class="item"><div class="l">筛选</div><div class="v" id="filterDisplay" style="font-size:12px;">全部</div></div>
            </div>
            <div class="card" style="padding:6px 4px;">
                <div class="slot-grid" id="tableContainer"></div>
                <div class="info" id="infoNote">提示：选择技能后，仅显示匹配的技能行</div>
            </div>
        </div>

        <a href="../index.html" class="back">返回短脖子乔治</a>
        </div>
    </div>

                '死灵法师': '以命续命', '狂骑士': '怒涛狂澜', '雾刃': '多重风刃', '德鲁伊': '野蛮生长', '术士': '深渊裂隙' },
            '主手_肩膀_裤子_2': { '法师': '冰霜射线', '野蛮人': '大地线路', '武行者': '翔龙', '猎魔人': '烟雾弹', '圣教军': '神圣之链',
                '死灵法师': '精魂引爆', '狂骑士': '索魂链', '雾刃': '狂风斩', '德鲁伊': '自然契约·狼群', '术士': '魔影掠空' },
            '副手_头盔_肩膀_2': { '法师': '黑洞', '野蛮人': '抓取', '武行者': '禁之拳', '猎魔人': '逃脱', '圣教军': '天堂之拳',
                '死灵法师': '亡者之甲', '狂骑士': '暗影雾', '雾刃': '移形换影', '德鲁伊': '自然契约·暴熊', '术士': '血之契约' },
            '副手_衣服_裤子_2': { '法师': '时间延缓', '野蛮人': '裂地破', '武行者': '回天息', '猎魔人': '憎恨', '圣教军': '审判',
                '死灵法师': '黑暗诅咒', '狂骑士': '暗影注能', '雾刃': '海潮吞噬', '德鲁伊': '自然契约·树精', '术士': '魔血灼煌' }
        };
        var KEYS = Object.keys(DATA);

        function getSkills(cls) {
            var s = [],
                seen = {};
            KEYS.forEach(function(k) {
                var v = DATA[k][cls];
                if (v && v !== '—' && !seen[v]) { seen[v] = 1;
                    s.push(v); }
            });
            return s;
        }

        function buildAllData(from, to) {
            var map = {};
            SLOTS.forEach(function(s) { map[s] = []; });
            KEYS.forEach(function(k) {
                var fs = DATA[k][from] || '—',
                    ts = DATA[k][to] || '—';
                if (fs === '—' || ts === '—') return;
                var parts = k.split('_');
                parts.forEach(function(p) {
                    var slot = p.replace('_2', '');
                    if (SLOTS.indexOf(slot) !== -1) {
                        var exists = map[slot].some(function(item) { return item.fs === fs && item.ts === ts; });
                        if (!exists) map[slot].push({ fs: fs, ts: ts });
                    }
                });
            });
            return map;
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'),
                toSel = document.getElementById('classTo');
            CLASSES.forEach(function(c) {
                var o1 = document.createElement('option');
                o1.value = c;
                o1.textContent = c;
                fromSel.appendChild(o1);
                var o2 = document.createElement('option');
                o2.value = c;
                o2.textContent = c;
                toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateFrom();
            updateTo();
            calc();
        };

        function updateFrom() {
            var cls = document.getElementById('classFrom').value,
                sel = document.getElementById('skillFrom'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function updateTo() {
            var cls = document.getElementById('classTo').value,
                sel = document.getElementById('skillTo'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function calc() {
            var from = document.getElementById('classFrom').value,
                to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value,
                fTo = document.getElementById('skillTo').value;
            if (from === to) { alert('当前职业和目标职业不能相同！'); return; }

            var fullMap = buildAllData(from, to);

            var matchedCount = 0;
            var displayItems = [];
            var order = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];

            order.forEach(function(slot) {
                var list = fullMap[slot] || [];
                var hasMatch = false;
                var filteredList = [];

                if (fFrom || fTo) {
                    list.forEach(function(pair) {
                        var match = true;
                        if (fFrom && pair.fs !== fFrom) match = false;
                        if (fTo && pair.ts !== fTo) match = false;
                        if (match) {
                            hasMatch = true;
                            filteredList.push(pair);
                        }
                    });
                } else {
                    filteredList = list;
                    hasMatch = list.length > 0;
                }

                if (hasMatch) matchedCount++;
                displayItems.push({
                    slot: slot,
                    list: filteredList,
                    hasMatch: hasMatch,
                    totalCount: list.length
                });
            });

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = displayItems.length;
            document.getElementById('matchedSlots').textContent = matchedCount;

            var fd = '';
            if (fFrom && fTo) fd = fFrom + ' → ' + fTo;
            else if (fFrom) fd = '当前:' + fFrom;
            else if (fTo) fd = '目标:' + fTo;
            else fd = '全部';
            document.getElementById('filterDisplay').textContent = fd;

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';

            var hasAny = displayItems.some(function(item) { return item.list.length > 0; });
            if (!hasAny) {
                container.innerHTML = '<div class="no-result">未找到任何匹配的技能映射</div>';
                document.getElementById('infoNote').textContent = '提示：' + from + ' → ' + to + '：无匹配技能。';
                return;
            }

            displayItems.forEach(function(item) {
                var sec = document.createElement('div');
                sec.className = 'slot-section';

                if (item.hasMatch && (fFrom || fTo)) {
                    sec.classList.add('matched');
                } else {
                    sec.classList.add('unmatched');
                }

                var title = document.createElement('div');
                title.className = 'slot-title';
                if (item.hasMatch && (fFrom || fTo)) {
                    title.textContent = item.slot + ' · 匹配';
                } else {
                    title.textContent = item.slot;
                }
                sec.appendChild(title);

                if (item.list.length === 0) {
                    var emptyRow = document.createElement('div');
                    emptyRow.className = 'skill-row';
                    emptyRow.style.justifyContent = 'center';
                    emptyRow.style.color = '#5a6a7e';
                    emptyRow.style.fontSize = '10px';
                    emptyRow.style.opacity = '0.5';
                    emptyRow.textContent = '— 无匹配 —';
                    sec.appendChild(emptyRow);
                } else {
                    item.list.forEach(function(pair) {
                        var row = document.createElement('div');
                        row.className = 'skill-row';
                        row.innerHTML =
                            '<span class="from-skill">' + pair.fs + '</span>' +
                            '<span><span class="arrow-icon">→</span><span class="to-skill">' + pair.ts +
                            '</span></span>';
                        sec.appendChild(row);
                    });
                }

                var count = document.createElement('div');
                count.className = 'slot-count';
                if (item.hasMatch && (fFrom || fTo)) {
                    count.textContent = '匹配 ' + item.list.length + ' / ' + item.totalCount + ' 个';
                } else {
                    count.textContent = item.list.length + ' 个技能';
                }
                sec.appendChild(count);

                container.appendChild(sec);
            });

            var matchDesc = matchedCount > 0 ? matchedCount + ' 个部位有匹配' : '无匹配部位';
            document.getElementById('infoNote').textContent = '提示：' + from + ' → ' + to + '：共 ' + displayItems.length +
                ' 个部位，' + matchDesc + '。';
        }
    </script>
</body>
</html>
