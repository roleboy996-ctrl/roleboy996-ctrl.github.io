<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恐惧词条转换</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }

        /* ----- 精简头部 ----- */
        .header {
            text-align: center;
            padding: 10px 0 6px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 12px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            display: none;
        }

        /* ----- 卡片（更紧凑） ----- */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* ----- 表单行（紧凑） ----- */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 6px;
            margin-bottom: 8px;
        }
        .form-row:last-child {
            margin-bottom: 0;
        }
        .form-group {
            flex: 1 1 calc(50% - 6px);
            min-width: 80px;
        }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 2px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 6px 8px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            height: 34px;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
        }
        .form-group select option {
            background: #1a212b;
        }

        /* ----- 查询按钮（紧凑） ----- */
        .calc-btn {
            width: 100%;
            padding: 8px 0;
            background: var(--gold-gradient);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-display);
            letter-spacing: 1px;
            height: 34px;
            line-height: 1;
        }
        .calc-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 16px rgba(200, 169, 110, 0.25);
        }
        .calc-btn:active {
            transform: scale(0.97);
        }

        .form-group-btn {
            flex: 1 1 calc(50% - 6px);
            min-width: 80px;
            display: flex;
            align-items: flex-end;
        }
        .form-group-btn .calc-btn {
            margin-bottom: 0;
        }

        /* ----- 筛选提示（更小） ----- */
        .filter-hint {
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
            padding-right: 2px;
            line-height: 34px;
            flex: 0 0 auto;
        }

        /* ----- 汇总卡片（紧凑） ----- */
        .result-grid-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }
        .summary-item {
            background: #0f161e;
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .summary-item .label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .summary-item .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 0px;
        }
        .summary-item .value.green {
            color: #5fcb9a;
        }

        /* ----- 结果卡片网格（3列变2列） ----- */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-top: 4px;
        }
        .result-item {
            background: #0f161e;
            border-radius: 10px;
            padding: 8px 6px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .result-item .slot-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 4px;
        }
        .result-item .skill-pair {
            font-size: 12px;
            margin: 2px 0;
            line-height: 1.4;
        }
        .result-item .skill-from {
            color: #f6d365;
        }
        .result-item .skill-to {
            color: #6cb4ee;
        }
        .result-item .arrow {
            color: var(--text-muted);
            font-size: 10px;
            margin: 0 2px;
        }
        .result-item .sub-text {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .result-item .highlight {
            background: rgba(200, 169, 110, 0.15);
            border-radius: 3px;
            padding: 1px 4px;
            display: inline-block;
        }

        /* ----- 无结果 ----- */
        .no-result {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 14px;
            grid-column: 1/-1;
        }
        .no-result .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        /* ----- 底部提示 ----- */
        .info-note {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 8px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: var(--gold);
        }

        /* ----- 移动端优先：屏幕宽度 ≤ 640px 时进一步压缩 ----- */
        @media (max-width: 640px) {
            body { padding: 8px 6px; }
            .card { padding: 10px 8px; border-radius: 12px; }
            .header h1 { font-size: 17px; }
            .form-group select { font-size: 12px; padding: 4px 6px; height: 30px; }
            .calc-btn { font-size: 13px; height: 30px; padding: 6px 0; }
            .form-group label { font-size: 9px; }
            .form-row { gap: 6px 4px; margin-bottom: 6px; }
            .result-grid { grid-template-columns: 1fr 1fr; gap: 4px; }
            .result-item { padding: 6px 4px; border-radius: 8px; }
            .result-item .slot-name { font-size: 10px; padding-bottom: 3px; margin-bottom: 3px; }
            .result-item .skill-pair { font-size: 11px; }
            .result-item .sub-text { font-size: 8px; }
            .summary-item .value { font-size: 14px; }
            .summary-item { padding: 4px 2px; }
            .filter-hint { font-size: 9px; line-height: 30px; }
            .info-note { font-size: 10px; padding-top: 6px; margin-top: 6px; }
            .back-link { font-size: 11px; margin-top: 8px; }
        }

        /* 超小屏（≤420px） */
        @media (max-width: 420px) {
            .form-group { flex: 1 1 100%; }
            .form-group-btn { flex: 1 1 100%; }
            .filter-hint { text-align: center; line-height: 1.6; flex: 1 1 100%; }
            .result-grid { grid-template-columns: 1fr 1fr; }
            .result-grid-summary { grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        }

        /* 桌面端（>640px）保留原样，只微调 */
        @media (min-width: 641px) {
            .header h1 { font-size: 28px; }
            .header .sub { display: block; color: var(--text-secondary); font-size: 14px; letter-spacing: 2px; margin-top: 4px; }
            .form-group select { padding: 10px 14px; height: auto; font-size: 15px; }
            .calc-btn { padding: 14px; height: auto; font-size: 18px; }
            .result-grid { grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
            .result-item { padding: 14px 10px; }
            .result-item .skill-pair { font-size: 14px; }
            .summary-item .value { font-size: 22px; }
            .info-note { font-size: 13px; }
            .filter-hint { font-size: 12px; line-height: 34px; }
            .form-row { gap: 16px 20px; }
            .card { padding: 24px 20px; }
            body { padding: 20px; }
        }
    </style>
</head>

            function unlock() {
                var inputVal = lockInput.value.trim();
                if (inputVal === CORRECT_PASSWORD) {
                    sessionStorage.setItem('skill_convert_unlocked', 'true');
                    lockScreen.style.display = 'none';
                    lockInput.disabled = true;
                    lockError.style.opacity = '0';
                } else {
                    lockError.style.opacity = '1';
                    lockInput.value = '';
                    lockInput.focus();
                    lockInput.style.borderColor = '#f87171';
                    setTimeout(function() { lockInput.style.borderColor = ''; }, 500);
                }
            }

            lockBtn.addEventListener('click', unlock);
            lockInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); unlock(); }
            });
            lockInput.focus();

            var skills = [], seen = {};
            for (var key in RAW_DATA) {
                var skill = RAW_DATA[key][cls];
                if (skill && skill !== '—' && !seen[skill]) { seen[skill] = true; skills.push(skill); }
            }
            return skills;
        }

        function buildSlotData(fromCls, toCls, filterFrom, filterTo) {
            var slotMap = {};
            SLOT_NAMES.forEach(function(s) { slotMap[s] = []; });
            for (var key in RAW_DATA) {
                var entry = RAW_DATA[key], fromSkill = entry[fromCls] || '—', toSkill = entry[toCls] || '—';
                if (fromSkill === '—' || toSkill === '—') continue;
                if (filterFrom && fromSkill !== filterFrom) continue;
                if (filterTo && toSkill !== filterTo) continue;
                var parts = key.split('_');
                parts.forEach(function(p) {
                    var slotName = p.replace('_2', '');
                    if (SLOT_NAMES.indexOf(slotName) !== -1) {
                        var exists = slotMap[slotName].some(function(item) {
                            return item.fromSkill === fromSkill && item.toSkill === toSkill;
                        });
                        if (!exists) slotMap[slotName].push({ fromSkill: fromSkill, toSkill: toSkill });
                    }
                });
            }
            return slotMap;
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'), toSel = document.getElementById('classTo');
            CLASSES.forEach(function(cls) {
                var o1 = document.createElement('option'); o1.value = cls; o1.textContent = cls; fromSel.appendChild(o1);
                var o2 = document.createElement('option'); o2.value = cls; o2.textContent = cls; toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人'; toSel.value = '法师';
            updateFromSkills(); updateToSkills(); calculate();
        };

        function updateFromSkills() {
            var cls = document.getElementById('classFrom').value, sel = document.getElementById('skillFrom'), cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkillsForClass(cls).forEach(function(s) {
                var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
            });
            var exists = false; for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { exists = true; break; } }
            if (exists) sel.value = cur;
        }

        function updateToSkills() {
            var cls = document.getElementById('classTo').value, sel = document.getElementById('skillTo'), cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkillsForClass(cls).forEach(function(s) {
                var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
            });
            var exists = false; for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { exists = true; break; } }
            if (exists) sel.value = cur;
        }

        function calculate() {
            var fromCls = document.getElementById('classFrom').value, toCls = document.getElementById('classTo').value;
            var filterFrom = document.getElementById('skillFrom').value, filterTo = document.getElementById('skillTo').value;
            if (fromCls === toCls) { alert('当前职业和目标职业不能相同！'); return; }
            var slotData = buildSlotData(fromCls, toCls, filterFrom, filterTo);
            var totalSlots = 0, totalMatches = 0, displaySlots = [];
            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                if (items.length > 0) { totalSlots++; totalMatches += items.length; displaySlots.push({ slot: slot, items: items }); }
            });
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = totalSlots;
            document.getElementById('totalMatches').textContent = totalMatches;
            var fd = '';
            if (filterFrom && filterTo) fd = filterFrom + '→' + filterTo;
            else if (filterFrom) fd = '当前:' + filterFrom;
            else if (filterTo) fd = '目标:' + filterTo;
            else fd = '全部';
            document.getElementById('filterDisplay').textContent = fd;

            var grid = document.getElementById('slotGrid');
            grid.innerHTML = '';
            if (displaySlots.length === 0) {
                grid.innerHTML = '<div class="no-result"><span class="icon">🔍</span><div>未找到匹配</div></div>';
                document.getElementById('infoNote').textContent = '💡 ' + fromCls + ' → ' + toCls + '：未找到可转换的恐惧词条。';
                return;
            }
            displaySlots.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'result-item';
                var html = '<div class="slot-name">' + item.slot + '</div>';
                item.items.forEach(function(pair) {
                    var isH = (filterFrom && filterTo && pair.fromSkill === filterFrom && pair.toSkill === filterTo);
                    var fc = isH ? 'highlight skill-from' : 'skill-from';
                    var tc = isH ? 'highlight skill-to' : 'skill-to';
                    html += '<div class="skill-pair"><span class="' + fc + '">' + pair.fromSkill + '</span><span class="arrow">→</span><span class="' + tc + '">' + pair.toSkill + '</span></div>';
                });
                html += '<div class="sub-text">' + item.items.length + ' 个</div>';
                div.innerHTML = html;
                grid.appendChild(div);
            });
            document.getElementById('infoNote').textContent = '💡 ' + fromCls + ' → ' + toCls + '：' + totalSlots + ' 个部位，' + totalMatches + ' 个技能可转换。';
        }
    </script>
</body>
</html>
