<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恐惧词条转换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 8px 6px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 100%;
        }

        /* ----- 头部 ----- */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 8px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 10px;
            color: #7a8a9e;
            margin-left: 4px;
        }

        /* ----- 卡片 ----- */
        .card {
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid #2a3a4a;
            border-radius: 10px;
            padding: 8px 6px;
            margin-bottom: 8px;
        }

        /* ----- 表单 ----- */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 4px;
            align-items: center;
        }
        .form-row .fg {
            flex: 1 1 auto;
            min-width: 52px;
            max-width: 110px;
        }
        .form-row .fg label {
            display: block;
            font-size: 8px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 1px;
        }
        .form-row .fg select {
            width: 100%;
            padding: 3px 4px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            height: 26px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-row .fg select:focus {
            border-color: #c8a96e;
        }
        .form-row .btn {
            flex: 0 0 auto;
            padding: 4px 12px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 6px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 12px;
            height: 26px;
            cursor: pointer;
        }
        .form-row .hint {
            font-size: 8px;
            color: #5a6a7e;
            white-space: nowrap;
            line-height: 26px;
        }

        /* ----- 汇总 ----- */
        .summary {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .summary .item {
            flex: 1;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            padding: 4px 2px;
            text-align: center;
        }
        .summary .item .l {
            font-size: 8px;
            color: #7a8a9e;
        }
        .summary .item .v {
            font-size: 14px;
            font-weight: 700;
            color: #f6d365;
        }
        .summary .item .v.g {
            color: #5fcb9a;
        }

        /* ===== 左右两列网格 ===== */
        .slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .slot-section {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 6px 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .slot-title {
            font-size: 13px;
            font-weight: 600;
            color: #c8a96e;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }
        .skill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px solid #1a212b;
            font-size: 11px;
        }
        .skill-row:last-child {
            border-bottom: none;
        }
        .skill-row .from-skill {
            color: #f6d365;
            font-weight: 500;
        }
        .skill-row .to-skill {
            color: #6cb4ee;
            font-weight: 500;
        }
        .skill-row .arrow-icon {
            color: #4a5a6e;
            font-size: 10px;
            margin: 0 3px;
        }
        .slot-count {
            font-size: 10px;
            color: #5a6a7e;
            margin-top: 3px;
            padding-top: 3px;
            border-top: 1px dashed #2a3a4a;
            text-align: right;
        }

        /* ===== 匹配部位高亮 ===== */
        .slot-section.matched {
            border-color: #c8a96e;
            box-shadow: 0 0 20px rgba(200, 169, 110, 0.08);
        }
        .slot-section.matched .slot-title {
            font-size: 15px;
            color: #f6d365;
        }
        .slot-section.matched .skill-row {
            font-size: 13px;
            padding: 3px 0;
        }
        .slot-section.matched .skill-row .arrow-icon {
            font-size: 12px;
        }
        .slot-section.matched .slot-count {
            font-size: 11px;
            color: #c8a96e;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 16px 0;
            font-size: 13px;
            grid-column: 1 / -1;
        }
        .info {
            font-size: 10px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #2a3a4a;
            padding-top: 6px;
            margin-top: 6px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: #5a6a7e;
            font-size: 11px;
            text-decoration: none;
        }
        .back:hover {
            color: #c8a96e;
        }

        /* ----- 密码锁 ----- */
        .lock-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .lock-box .inner {
            background: rgba(20, 25, 35, 0.9);
            border: 1px solid #2a3a4a;
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        .lock-box .inner h2 {
            color: #f6d365;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .lock-box .inner p {
            color: #7a8a9e;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .lock-box .inner input {
            width: 100%;
            padding: 8px 12px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }
        .lock-box .inner input:focus {
            border-color: #c8a96e;
        }
        .lock-box .inner button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .lock-box .inner .err {
            color: #f87171;
            font-size: 12px;
            margin-top: 6px;
            min-height: 20px;
            opacity: 0;
        }

        /* ----- 手机端两列缩小字号 ----- */
        @media (max-width: 480px) {
            .slot-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }
            .slot-section {
                padding: 4px 5px;
                border-radius: 6px;
            }
            .slot-title {
                font-size: 11px;
            }
            .skill-row {
                font-size: 9px;
                padding: 1px 0;
            }
            .skill-row .arrow-icon {
                font-size: 8px;
                margin: 0 2px;
            }
            .slot-count {
                font-size: 8px;
                margin-top: 2px;
                padding-top: 2px;
            }
            .slot-section.matched .slot-title {
                font-size: 13px;
            }
            .slot-section.matched .skill-row {
                font-size: 11px;
                padding: 2px 0;
            }
            .slot-section.matched .skill-row .arrow-icon {
                font-size: 10px;
            }
            .slot-section.matched .slot-count {
                font-size: 10px;
            }
            .form-row .fg {
                min-width: 40px;
                max-width: 80px;
            }
            .form-row .fg select {
                font-size: 9px;
                height: 22px;
                padding: 2px 3px;
            }
            .form-row .btn {
                font-size: 10px;
                height: 22px;
                padding: 3px 8px;
            }
            .summary .item .v {
                font-size: 12px;
            }
            .summary .item .l {
                font-size: 7px;
            }
        }
        @media (max-width: 380px) {
            .slot-grid {
                gap: 3px;
            }
            .slot-section {
                padding: 3px 4px;
            }
            .slot-title {
                font-size: 10px;
            }
            .skill-row {
                font-size: 8px;
                padding: 1px 0;
            }
            .slot-section.matched .slot-title {
                font-size: 12px;
            }
            .slot-section.matched .skill-row {
                font-size: 10px;
            }
            .form-row .fg {
                min-width: 34px;
                max-width: 65px;
            }
            .form-row .fg select {
                font-size: 8px;
                height: 20px;
            }
            .form-row .btn {
                font-size: 9px;
                height: 20px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>

    <!-- 密码锁 -->
    <div class="lock-box" id="lockScreen">
        <div class="inner">
            <h2>🔐 工具已加密</h2>
            <p>请输入访问密码</p>
            <input type="password" id="lockInput" placeholder="密码" maxlength="20" autofocus>
            <button id="lockBtn">解锁</button>
            <div class="err" id="lockError">❌ 密码错误</div>
        </div>
    </div>

    <div class="wrap">

        <!-- 头部 -->
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>⚔️ 恐惧词条转换</h1>
            <span class="sub">暗黑不灭</span>
        </div>

        <!-- 表单 -->
        <div class="card">
            <div class="form-row">
                <div class="fg"><label>当前</label><select id="classFrom" onchange="updateFrom()"></select></div>
                <div class="fg"><label>目标</label><select id="classTo" onchange="updateTo()"></select></div>
                <div class="fg"><label>当前技能</label><select id="skillFrom"><option value="">全部</option></select></div>
                <div class="fg"><label>目标技能</label><select id="skillTo"><option value="">全部</option></select></div>
                <button class="btn" onclick="calc()">查询</button>
                <span class="hint">组合筛选</span>
            </div>
        </div>

        <!-- 结果 -->
        <div id="resultArea" style="display:none;">
            <div class="summary">
                <div class="item"><div class="l">总部位</div><div class="v" id="totalSlots">0</div></div>
                <div class="item"><div class="l">匹配部位</div><div class="v g" id="matchedSlots">0</div></div>
                <div class="item"><div class="l">筛选</div><div class="v" id="filterDisplay" style="font-size:12px;">全部</div></div>
            </div>
            <div class="card" style="padding:6px 4px;">
                <div class="slot-grid" id="tableContainer"></div>
                <div class="info" id="infoNote">💡 选择两个职业，匹配部位会放大显示</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back">🏠 返回暗黑の不灭</a>
    </div>

    <script>
        // ----- 密码锁 -----
        (function() {
            var pw = '666888';
            var screen = document.getElementById('lockScreen');
            var input = document.getElementById('lockInput');
            var btn = document.getElementById('lockBtn');
            var err = document.getElementById('lockError');
            if (sessionStorage.getItem('skill_unlocked') === 'true') {
                screen.style.display = 'none';
                return;
            }

            function unlock() {
                if (input.value.trim() === pw) {
                    sessionStorage.setItem('skill_unlocked', 'true');
                    screen.style.display = 'none';
                    err.style.opacity = '0';
                } else {
                    err.style.opacity = '1';
                    input.value = '';
                    input.focus();
                    input.style.borderColor = '#f87171';
                    setTimeout(function() { input.style.borderColor = ''; }, 500);
                }
            }
            btn.addEventListener('click', unlock);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault();
                    unlock(); }
            });
            input.focus();
        })();

        // ----- 数据 -----
        var CLASSES = ['法师', '野蛮人', '武行者', '猎魔人', '圣教军', '死灵法师', '狂骑士', '雾刃', '德鲁伊', '术士'];
        var SLOTS = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];
        var DATA = {
            '主手_衣服_裤子': { '法师': '寒冰护甲', '野蛮人': '旋风击', '武行者': '金钟破', '猎魔人': '绳索射击', '圣教军': '战马拖行', '死灵法师': '号令石魔',
                '狂骑士': '潜行怒袭', '雾刃': '踏浪闪', '德鲁伊': '变形术·狼', '术士': '恶魔之门' },
            '主手_肩膀_裤子': { '法师': '传送', '野蛮人': '不灭之怒', '武行者': '精神体', '猎魔人': '推射', '圣教军': '天罚之剑', '死灵法师': '亡者战士',
                '狂骑士': '魔灵狂魔', '雾刃': '潮汐漩涡', '德鲁伊': '变形术·熊', '术士': '原初降临' },
            '主手_头盔_肩膀': { '法师': '奥术洪流', '野蛮人': '疾奔', '武行者': '七相拳', '猎魔人': '多重射击', '圣教军': '奉献', '死灵法师': '邪矛',
                '狂骑士': '引渡吞噬', '雾刃': '飞流幻刃', '德鲁伊': '熔火漩涡', '术士': '炼狱苦刑' },
            '主手_头盔_衣服': { '法师': '奥术旋风', '野蛮人': '斗者之怒', '武行者': '幻身击', '猎魔人': '暗影飞刀', '圣教军': '萨卡兰姆圣旗',
                '死灵法师': '亡者之墙', '狂骑士': '暗影长枪', '雾刃': '碧波寒涛', '德鲁伊': '裂地震击', '术士': '地狱烈焰' },
            '副手_衣服_裤子': { '法师': '陨石术', '野蛮人': '跃击', '武行者': '神级', '猎魔人': '扫射', '圣教军': '天谴', '死灵法师': '暗声掠影',
                '狂骑士': '雾影步', '雾刃': '荆棘铠甲', '德鲁伊': '腐化虫群', '术士': '—' },
            '副手_肩膀_裤子': { '法师': '瓦解射线', '野蛮人': '先祖之锤', '武行者': '踢击', '猎魔人': '憎恨之雨', '圣教军': '盾牌冲锋',
                '死灵法师': '尖硬地刺', '狂骑士': '如影随形', '雾刃': '风怒', '德鲁伊': '棘柱狂潮', '术士': '暗影箭' },
            '副手_头盔_肩膀': { '法师': '冰棱水晶', '野蛮人': '狂暴冲锋', '武行者': '金轮阵', '猎魔人': '飞轮刃', '圣教军': '回旋盾',
                '死灵法师': '亡者法师', '狂骑士': '无畏抗击', '雾刃': '疾风链影', '德鲁伊': '角鹿踏跃', '术士': '暗影爆破' },
            '副手_头盔_衣服': { '法师': '闪电新星', '野蛮人': '原劈', '武行者': '爆裂掌', '猎魔人': '箭塔', '圣教军': '圣光护体', '死灵法师': '鬼行术',
                '狂骑士': '横扫千军', '雾刃': '暴风刃舞', '德鲁伊': '渡鸦幻遁', '术士': '黑暗仪式' },
            '主手_衣服_裤子_2': { '法师': '灼烧之球', '野蛮人': '锁链长矛', '武行者': '风破', '猎魔人': '狩猎之眼', '圣教军': '横扫',
                '死灵法师': '镰刀切割', '狂骑士': '突刺进进', '雾刃': '破浪袭', '德鲁伊': '生命领域', '术士': '毁灭之爪' },
            '主手_头盔_衣服_2': { '法师': '霜冻领域', '野蛮人': '挫志咆哮', '武行者': '波动拳', '猎魔人': '刀扇陷阱', '圣教军': '盾闪',
                '死灵法师': '以命续命', '狂骑士': '怒涛狂澜', '雾刃': '多重风刃', '德鲁伊': '野蛮生长', '术士': '深渊裂隙' },
            '主手_肩膀_裤子_2': { '法师': '冰霜射线', '野蛮人': '大地线路', '武行者': '翔龙', '猎魔人': '烟雾弹', '圣教军': '神圣之链',
                '死灵法师': '精魂引爆', '狂骑士': '索魂链', '雾刃': '狂风斩', '德鲁伊': '自然契约·狼群', '术士': '魔影掠空' },
            '副手_头盔_肩膀_2': { '法师': '黑洞', '野蛮人': '抓取', '武行者': '禁之拳', '猎魔人': '逃脱', '圣教军': '天堂之拳',
                '死灵法师': '亡者之甲', '狂骑士': '暗影雾', '雾刃': '移形换影', '德鲁伊': '自然契约·暴熊', '术士': '血之契约' },
            '副手_衣服_裤子_2': { '法师': '时间延缓', '野蛮人': '裂地破', '武行者': '回天息', '猎魔人': '憎恨', '圣教军': '审判',
                '死灵法师': '黑暗诅咒', '狂骑士': '暗影注能', '雾刃': '海潮吞噬', '德鲁伊': '自然契约·树精', '术士': '魔血灼煌' }
        };
        var KEYS = Object.keys(DATA);

        function getSkills(cls) {
            var s = [],
                seen = {};
            KEYS.forEach(function(k) {
                var v = DATA[k][cls];
                if (v && v !== '—' && !seen[v]) { seen[v] = 1;
                    s.push(v); }
            });
            return s;
        }

        function buildData(from, to, fFrom, fTo) {
            var map = {};
            SLOTS.forEach(function(s) { map[s] = []; });
            KEYS.forEach(function(k) {
                var fs = DATA[k][from] || '—',
                    ts = DATA[k][to] || '—';
                if (fs === '—' || ts === '—') return;
                // 应用筛选条件（提前过滤，只保留匹配的技能对）
                if (fFrom && fs !== fFrom) return;
                if (fTo && ts !== fTo) return;
                var parts = k.split('_');
                parts.forEach(function(p) {
                    var slot = p.replace('_2', '');
                    if (SLOTS.indexOf(slot) !== -1) {
                        var exists = map[slot].some(function(item) { return item.fs === fs && item.ts === ts; });
                        if (!exists) map[slot].push({ fs: fs, ts: ts });
                    }
                });
            });
            return map;
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'),
                toSel = document.getElementById('classTo');
            CLASSES.forEach(function(c) {
                var o1 = document.createElement('option');
                o1.value = c;
                o1.textContent = c;
                fromSel.appendChild(o1);
                var o2 = document.createElement('option');
                o2.value = c;
                o2.textContent = c;
                toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateFrom();
            updateTo();
            calc();
        };

        function updateFrom() {
            var cls = document.getElementById('classFrom').value,
                sel = document.getElementById('skillFrom'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function updateTo() {
            var cls = document.getElementById('classTo').value,
                sel = document.getElementById('skillTo'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function calc() {
            var from = document.getElementById('classFrom').value,
                to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value,
                fTo = document.getElementById('skillTo').value;
            if (from === to) { alert('当前职业和目标职业不能相同！'); return; }

            // 获取过滤后的映射数据（只保留匹配的技能对）
            var filteredMap = buildData(from, to, fFrom, fTo);

            // 统计有匹配技能的部位
            var matchedCount = 0;
            var displayItems = [];
            SLOTS.forEach(function(slot) {
                var list = filteredMap[slot] || [];
                if (list.length > 0) {
                    matchedCount++;
                    displayItems.push({ slot: slot, list: list });
                }
            });

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = displayItems.length;
            document.getElementById('matchedSlots').textContent = matchedCount;

            var fd = '';
            if (fFrom && fTo) fd = fFrom + ' → ' + fTo;
            else if (fFrom) fd = '当前:' + fFrom;
            else if (fTo) fd = '目标:' + fTo;
            else fd = '全部';
            document.getElementById('filterDisplay').textContent = fd;

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';
            if (displayItems.length === 0) {
                container.innerHTML = '<div class="no-result">🔍 未找到任何匹配的技能映射</div>';
                document.getElementById('infoNote').textContent = '💡 ' + from + ' → ' + to + '：无匹配技能。';
                return;
            }

            // 按顺序排列
            var order = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];
            var sortedItems = [];
            order.forEach(function(slot) {
                var found = displayItems.find(function(item) { return item.slot === slot; });
                if (found) sortedItems.push(found);
            });

            sortedItems.forEach(function(item) {
                var sec = document.createElement('div');
                sec.className = 'slot-section';
                // 只要有技能匹配就高亮（此时筛选条件一定存在，所以直接高亮）
                sec.classList.add('matched');

                var title = document.createElement('div');
                title.className = 'slot-title';
                title.textContent = '📌 ' + item.slot;
                sec.appendChild(title);

                item.list.forEach(function(pair) {
                    var row = document.createElement('div');
                    row.className = 'skill-row';
                    row.innerHTML =
                        '<span class="from-skill">' + pair.fs + '</span>' +
                        '<span><span class="arrow-icon">→</span><span class="to-skill">' + pair.ts + '</span></span>';
                    sec.appendChild(row);
                });

                var count = document.createElement('div');
                count.className = 'slot-count';
                count.textContent = '✅ ' + item.list.length + ' 个技能';
                sec.appendChild(count);

                container.appendChild(sec);
            });

            var matchDesc = matchedCount > 0 ? matchedCount + ' 个部位匹配' : '无匹配部位';
            document.getElementById('infoNote').textContent = '💡 ' + from + ' → ' + to + '：共 ' + displayItems.length +
                ' 个部位包含匹配技能，' + matchDesc + '。';
        }
    </script>
</body>
</html>
