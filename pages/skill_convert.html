<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽百宝箱 · 魔法词条转换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #07090d;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 18px 12px 26px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 1120px;
            width: 100%;
            margin: 0 auto;
        }
        .main-panel {
            position: relative;
            padding: 16px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }

        /* ----- 头部 ----- */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0 12px;
            border-bottom: 1px solid #26384a;
            margin-bottom: 12px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(214, 183, 111, 0.3);
        }
        .header h1 {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 18px;
            height: 18px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: linear-gradient(135deg, #f0c95a, #d6b76f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 10px;
            color: #7a8a9e;
            margin-left: 4px;
        }

        /* ----- 卡片 ----- */
        .card {
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        /* ----- 表单 ----- */
        .convert-card {
            display: grid;
            gap: 12px;
        }
        .route-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 10px;
            align-items: center;
        }
        .filter-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
            gap: 10px;
            align-items: end;
            padding-top: 10px;
            border-top: 1px dashed rgba(38, 56, 74, 0.9);
        }
        .route-arrow {
            display: inline-grid;
            align-items: center;
            justify-content: center;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 1px solid rgba(214, 183, 111, 0.32);
            background: rgba(214, 183, 111, 0.08);
            color: #f0c95a;
            cursor: pointer;
            transition: 0.2s;
        }
        .route-arrow svg {
            width: 18px;
            height: 18px;
        }
        .route-arrow:hover {
            border-color: rgba(214, 183, 111, 0.62);
            background: rgba(214, 183, 111, 0.15);
            transform: translateY(-1px);
        }
        .fg label {
            display: block;
            font-size: 10px;
            color: #7a8a9e;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .fg select {
            width: 100%;
            padding: 6px 10px;
            background: #101922;
            border: 1px solid #26384a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            height: 38px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .fg select:focus {
            border-color: #d6b76f;
        }
        .btn {
            padding: 0 14px;
            background: linear-gradient(135deg, #d6b76f, #f0c95a);
            border: none;
            border-radius: 8px;
            color: #070a0f;
            font-weight: 700;
            font-size: 13px;
            height: 38px;
            cursor: pointer;
        }
        .btn.secondary {
            background: rgba(52, 71, 90, 0.82);
            color: #dfe8f2;
            border: 1px solid rgba(52, 71, 90, 0.92);
        }

        /* ----- 汇总 ----- */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .summary .item {
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }
        .summary .item .l {
            font-size: 10px;
            color: #7a8a9e;
            margin-bottom: 4px;
        }
        .summary .item .v {
            font-size: 20px;
            font-weight: 800;
            color: #f0c95a;
        }
        .summary .item .v.g {
            color: #61d6a3;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .slot-section {
            background: rgba(16, 25, 34, 0.96);
            border: 1px solid #26384a;
            border-radius: 10px;
            padding: 10px 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .slot-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            font-size: 15px;
            font-weight: 800;
            color: #dfe8f2;
            margin-bottom: 8px;
            letter-spacing: 0;
        }
        .slot-title .slot-name {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .slot-title .slot-name::before {
            content: "";
            width: 3px;
            height: 14px;
            border-radius: 999px;
            background: #8f2c2c;
        }
        .slot-title .slot-count-inline {
            color: #7a8a9e;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border: 1px solid rgba(122, 138, 158, 0.28);
            border-radius: 999px;
            background: rgba(122, 138, 158, 0.08);
        }
        .mapping-list {
            display: grid;
            gap: 6px;
        }
        .skill-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            padding: 8px 10px;
            border: 1px solid rgba(38, 56, 74, 0.72);
            border-radius: 8px;
            background: rgba(9, 15, 22, 0.58);
            font-size: 13px;
            transition: font-size 0.2s, background 0.2s;
        }
        .skill-pair {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 28px minmax(0, 1fr);
            align-items: center;
            gap: 8px;
        }
        .skill-row .from-skill {
            color: #f0c95a;
            font-weight: 800;
        }
        .skill-row .to-skill {
            color: #6cb4ee;
            font-weight: 800;
            text-align: right;
        }
        .skill-row .arrow-icon {
            color: #7a8a9e;
            font-size: 12px;
            text-align: center;
        }
        .support-slots {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 4px;
            padding-top: 6px;
            border-top: 1px dashed rgba(38, 56, 74, 0.72);
        }
        .support-slots::before {
            content: "支持部位";
            color: #5a6a7e;
            font-size: 10px;
            line-height: 20px;
            margin-right: 2px;
        }
        .slot-tag {
            display: inline-flex;
            align-items: center;
            height: 20px;
            padding: 0 7px;
            border: 1px solid rgba(122, 138, 158, 0.24);
            border-radius: 999px;
            background: rgba(122, 138, 158, 0.08);
            color: #8d9aac;
            font-size: 10px;
            font-weight: 700;
        }
        .slot-tag.current {
            border-color: rgba(214, 183, 111, 0.42);
            background: rgba(214, 183, 111, 0.10);
            color: #f0c95a;
        }

        .slot-section.matched {
            border-color: #d6b76f;
            background: linear-gradient(90deg, rgba(143, 44, 44, 0.18), rgba(16, 25, 34, 0.96) 34%);
            box-shadow: inset 3px 0 0 rgba(143, 44, 44, 0.95), 0 0 18px rgba(143, 44, 44, 0.16);
        }
        .slot-section.matched .skill-row {
            background: rgba(214, 183, 111, 0.06);
            border-color: rgba(214, 183, 111, 0.24);
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 16px 0;
            font-size: 13px;
            grid-column: 1 / -1;
        }
        .info {
            font-size: 12px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #26384a;
            padding-top: 10px;
            margin-top: 10px;
        }
        .back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 10px auto 0;
            padding: 6px 12px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: #5a6a7e;
            font-size: 11px;
            text-decoration: none;
            transition: 0.2s;
        }
        .back::before {
            content: "←";
            color: #d6b76f;
        }
        .back:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: #d6b76f;
        }

        /* ----- 手机端适配：调大选项方便点击 ----- */
        @media (max-width: 640px) {
            .main-panel {
                padding: 10px;
            }
            .main-panel::before {
                left: 10px;
                right: 10px;
            }
            .route-row,
            .filter-row,
            .summary {
                grid-template-columns: 1fr;
            }
            .route-arrow {
                margin: -2px auto;
                transform: none;
            }
            .skill-row {
                text-align: left;
            }
            .skill-pair {
                grid-template-columns: 1fr;
                gap: 3px;
            }
            .skill-row .arrow-icon,
            .skill-row .to-skill,
            .support-slots {
                text-align: left;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="wrap">

        <!-- 头部 -->
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>
                <svg class="page-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5.6 8.5A7.2 7.2 0 0 1 17.9 6" fill="none" stroke="currentColor" stroke-linecap="round"/>
                    <path d="M17.9 6h-3.2M17.9 6V2.8" fill="none" stroke="currentColor" stroke-linecap="round"/>
                    <path d="M18.4 15.5A7.2 7.2 0 0 1 6.1 18" fill="none" stroke="currentColor" stroke-linecap="round"/>
                    <path d="M6.1 18h3.2M6.1 18v3.2" fill="none" stroke="currentColor" stroke-linecap="round"/>
                    <path d="M12 8.4l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8.8-2z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
                </svg>
                <span class="title-text">魔法词条转换</span>
            </h1>
            <span class="sub">百宝箱 · 词条转换 · 更新于 2026-06-25</span>
        </div>

        <div class="main-panel">
        <!-- 表单 -->
        <div class="card convert-card">
            <div class="route-row">
                <div class="fg"><label>当前职业</label><select id="classFrom" onchange="updateFrom(); calc()"></select></div>
                <button class="route-arrow" type="button" onclick="swapClasses()" title="交换当前和目标职业" aria-label="交换当前和目标职业">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 7h10l-3-3M17 17H7l3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="fg"><label>目标职业</label><select id="classTo" onchange="updateTo(); calc()"></select></div>
            </div>
            <div class="filter-row">
                <div class="fg"><label>当前技能</label><select id="skillFrom" onchange="calc()"><option value="">全部当前技能</option></select></div>
                <div class="fg"><label>目标技能</label><select id="skillTo" onchange="calc()"><option value="">全部目标技能</option></select></div>
                <button class="btn secondary" onclick="resetSkillFilter()">清空筛选</button>
            </div>
        </div>

        <!-- 结果 -->
        <div id="resultArea" style="display:none;">
            <div class="summary">
                <div class="item"><div class="l">总部位</div><div class="v" id="totalSlots">0</div></div>
                <div class="item"><div class="l">命中部位</div><div class="v g" id="matchedSlots">0</div></div>
                <div class="item"><div class="l">转换方向</div><div class="v" id="filterDisplay" style="font-size:12px;">全部</div></div>
            </div>
            <div class="card">
                <div class="slot-grid" id="tableContainer"></div>
                <div class="info" id="infoNote">选择技能后，仅显示命中的部位映射。</div>
            </div>
        </div>

        <a href="../index.html" class="back">返回百宝箱</a>
        </div>
    </div>

    <script>
        // ----- 数据 -----
        var CLASSES = ['法师', '野蛮人', '武行者', '猎魔人', '圣教军', '死灵法师', '狂骑士', '雾刃', '德鲁伊', '术士'];
        var SLOTS = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];
        var DATA = {
            '主手_衣服_裤子': { '法师': '寒冰护甲', '野蛮人': '旋风击', '武行者': '金钟破', '猎魔人': '绳索射击', '圣教军': '战马拖行', '死灵法师': '号令石魔',
                '狂骑士': '潜行怒袭', '雾刃': '踏浪闪', '德鲁伊': '变形术·狼', '术士': '恶魔之门' },
            '主手_肩膀_裤子': { '法师': '传送', '野蛮人': '不灭之怒', '武行者': '精神体', '猎魔人': '推射', '圣教军': '天罚之剑', '死灵法师': '亡者战士',
                '狂骑士': '魔灵狂魔', '雾刃': '潮汐漩涡', '德鲁伊': '变形术·熊', '术士': '原初降临' },
            '主手_头盔_肩膀': { '法师': '奥术洪流', '野蛮人': '疾奔', '武行者': '七相拳', '猎魔人': '多重射击', '圣教军': '奉献', '死灵法师': '邪矛',
                '狂骑士': '引渡吞噬', '雾刃': '飞流幻刃', '德鲁伊': '熔火漩涡', '术士': '炼狱苦刑' },
            '主手_头盔_衣服': { '法师': '奥术旋风', '野蛮人': '斗者之怒', '武行者': '幻身击', '猎魔人': '暗影飞刀', '圣教军': '萨卡兰姆圣旗',
                '死灵法师': '亡者之墙', '狂骑士': '暗影长枪', '雾刃': '碧波寒涛', '德鲁伊': '裂地震击', '术士': '地狱烈焰' },
            '副手_衣服_裤子': { '法师': '陨石术', '野蛮人': '跃击', '武行者': '神级', '猎魔人': '扫射', '圣教军': '天谴', '死灵法师': '暗声掠影',
                '狂骑士': '雾影步', '雾刃': '荆棘铠甲', '德鲁伊': '腐化虫群', '术士': '—' },
            '副手_肩膀_裤子': { '法师': '瓦解射线', '野蛮人': '先祖之锤', '武行者': '踢击', '猎魔人': '憎恨之雨', '圣教军': '盾牌冲锋',
                '死灵法师': '尖硬地刺', '狂骑士': '如影随形', '雾刃': '风怒', '德鲁伊': '棘柱狂潮', '术士': '暗影箭' },
            '副手_头盔_肩膀': { '法师': '冰棱水晶', '野蛮人': '狂暴冲锋', '武行者': '金轮阵', '猎魔人': '飞轮刃', '圣教军': '回旋盾',
                '死灵法师': '亡者法师', '狂骑士': '无畏抗击', '雾刃': '疾风链影', '德鲁伊': '角鹿踏跃', '术士': '暗影爆破' },
            '副手_头盔_衣服': { '法师': '闪电新星', '野蛮人': '原劈', '武行者': '爆裂掌', '猎魔人': '箭塔', '圣教军': '圣光护体', '死灵法师': '鬼行术',
                '狂骑士': '横扫千军', '雾刃': '暴风刃舞', '德鲁伊': '渡鸦幻遁', '术士': '黑暗仪式' },
            '主手_衣服_裤子_2': { '法师': '灼烧之球', '野蛮人': '锁链长矛', '武行者': '风破', '猎魔人': '狩猎之眼', '圣教军': '横扫',
                '死灵法师': '镰刀切割', '狂骑士': '突刺进进', '雾刃': '破浪袭', '德鲁伊': '生命领域', '术士': '毁灭之爪' },
            '主手_头盔_衣服_2': { '法师': '霜冻领域', '野蛮人': '挫志咆哮', '武行者': '波动拳', '猎魔人': '刀扇陷阱', '圣教军': '盾闪',
                '死灵法师': '以命续命', '狂骑士': '怒涛狂澜', '雾刃': '多重风刃', '德鲁伊': '野蛮生长', '术士': '深渊裂隙' },
            '主手_肩膀_裤子_2': { '法师': '冰霜射线', '野蛮人': '大地线路', '武行者': '翔龙', '猎魔人': '烟雾弹', '圣教军': '神圣之链',
                '死灵法师': '精魂引爆', '狂骑士': '索魂链', '雾刃': '狂风斩', '德鲁伊': '自然契约·狼群', '术士': '魔影掠空' },
            '副手_头盔_肩膀_2': { '法师': '黑洞', '野蛮人': '抓取', '武行者': '禁之拳', '猎魔人': '逃脱', '圣教军': '天堂之拳',
                '死灵法师': '亡者之甲', '狂骑士': '暗影雾', '雾刃': '移形换影', '德鲁伊': '自然契约·暴熊', '术士': '血之契约' },
            '副手_衣服_裤子_2': { '法师': '时间延缓', '野蛮人': '裂地破', '武行者': '回天息', '猎魔人': '憎恨', '圣教军': '审判',
                '死灵法师': '黑暗诅咒', '狂骑士': '暗影注能', '雾刃': '海潮吞噬', '德鲁伊': '自然契约·树精', '术士': '魔血灼煌' }
        };
        var KEYS = Object.keys(DATA);

        function getSkills(cls) {
            var s = [],
                seen = {};
            KEYS.forEach(function(k) {
                var v = DATA[k][cls];
                if (v && v !== '—' && !seen[v]) { seen[v] = 1;
                    s.push(v); }
            });
            return s;
        }

        function buildAllData(from, to) {
            var map = {};
            SLOTS.forEach(function(s) { map[s] = []; });
            KEYS.forEach(function(k) {
                var fs = DATA[k][from] || '—',
                    ts = DATA[k][to] || '—';
                if (fs === '—' || ts === '—') return;
                var parts = k.split('_');
                parts.forEach(function(p) {
                    var slot = p.replace('_2', '');
                    if (SLOTS.indexOf(slot) !== -1) {
                        var exists = map[slot].some(function(item) { return item.fs === fs && item.ts === ts; });
                        if (!exists) map[slot].push({ fs: fs, ts: ts });
                    }
                });
            });
            return map;
        }

        function getPairSlots(fullMap, pair, order) {
            return order.filter(function(slot) {
                return (fullMap[slot] || []).some(function(item) {
                    return item.fs === pair.fs && item.ts === pair.ts;
                });
            });
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'),
                toSel = document.getElementById('classTo');
            CLASSES.forEach(function(c) {
                var o1 = document.createElement('option');
                o1.value = c;
                o1.textContent = c;
                fromSel.appendChild(o1);
                var o2 = document.createElement('option');
                o2.value = c;
                o2.textContent = c;
                toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateFrom();
            updateTo();
            calc();
        };

        function updateFrom() {
            var cls = document.getElementById('classFrom').value,
                sel = document.getElementById('skillFrom'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部当前技能</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function updateTo() {
            var cls = document.getElementById('classTo').value,
                sel = document.getElementById('skillTo'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部目标技能</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function setSelectValueIfExists(select, value) {
            for (var i = 0; i < select.options.length; i++) {
                if (select.options[i].value === value) {
                    select.value = value;
                    return;
                }
            }
            select.value = '';
        }

        function swapClasses() {
            var classFrom = document.getElementById('classFrom');
            var classTo = document.getElementById('classTo');
            var skillFrom = document.getElementById('skillFrom');
            var skillTo = document.getElementById('skillTo');
            var oldFrom = classFrom.value;
            var oldTo = classTo.value;
            var oldFromSkill = skillFrom.value;
            var oldToSkill = skillTo.value;

            classFrom.value = oldTo;
            classTo.value = oldFrom;
            updateFrom();
            updateTo();
            setSelectValueIfExists(skillFrom, oldToSkill);
            setSelectValueIfExists(skillTo, oldFromSkill);
            calc();
        }

        function calc() {
            var from = document.getElementById('classFrom').value,
                to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value,
                fTo = document.getElementById('skillTo').value;
            if (from === to) {
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('totalSlots').textContent = 0;
                document.getElementById('matchedSlots').textContent = 0;
                document.getElementById('filterDisplay').textContent = '请更换职业';
                document.getElementById('tableContainer').innerHTML = '<div class="no-result">当前职业和目标职业不能相同</div>';
                document.getElementById('infoNote').textContent = '提示：选择不同职业后会自动刷新结果。';
                return;
            }

            var fullMap = buildAllData(from, to);

            var matchedCount = 0;
            var displayItems = [];
            var order = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];

            order.forEach(function(slot) {
                var list = fullMap[slot] || [];
                var hasMatch = false;
                var filteredList = [];

                if (fFrom || fTo) {
                    list.forEach(function(pair) {
                        var match = true;
                        if (fFrom && pair.fs !== fFrom) match = false;
                        if (fTo && pair.ts !== fTo) match = false;
                        if (match) {
                            hasMatch = true;
                            filteredList.push(pair);
                        }
                    });
                } else {
                    filteredList = list;
                    hasMatch = list.length > 0;
                }

                if (hasMatch) matchedCount++;
                displayItems.push({
                    slot: slot,
                    list: filteredList,
                    hasMatch: hasMatch,
                    totalCount: list.length
                });
            });

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = displayItems.length;
            document.getElementById('matchedSlots').textContent = matchedCount;

            document.getElementById('filterDisplay').textContent = from + ' → ' + to;

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';

            var hasAny = displayItems.some(function(item) { return item.list.length > 0; });
            if (!hasAny) {
                container.innerHTML = '<div class="no-result">未找到任何匹配的技能映射</div>';
                document.getElementById('infoNote').textContent = '提示：' + from + ' → ' + to + '：无匹配技能。';
                return;
            }

            displayItems.forEach(function(item) {
                if ((fFrom || fTo) && !item.hasMatch) return;

                var sec = document.createElement('div');
                sec.className = 'slot-section' + ((fFrom || fTo) ? ' matched' : '');

                var title = document.createElement('div');
                title.className = 'slot-title';
                title.innerHTML =
                    '<span class="slot-name">' + item.slot + '</span>' +
                    '<span class="slot-count-inline">' + ((fFrom || fTo) ? ('匹配 ' + item.list.length + ' / ' + item.totalCount) : (item.list.length + ' 个技能')) + '</span>';
                sec.appendChild(title);

                if (item.list.length === 0) {
                    var emptyRow = document.createElement('div');
                    emptyRow.className = 'skill-row';
                    emptyRow.style.justifyContent = 'center';
                    emptyRow.style.color = '#5a6a7e';
                    emptyRow.style.fontSize = '10px';
                    emptyRow.style.opacity = '0.5';
                    emptyRow.textContent = '— 无匹配 —';
                    sec.appendChild(emptyRow);
                } else {
                    var list = document.createElement('div');
                    list.className = 'mapping-list';
                    item.list.forEach(function(pair) {
                        var pairSlots = getPairSlots(fullMap, pair, order);
                        var slotTags = pairSlots.map(function(slot) {
                            return '<span class="slot-tag' + (slot === item.slot ? ' current' : '') + '">' + slot + '</span>';
                        }).join('');
                        var row = document.createElement('div');
                        row.className = 'skill-row';
                        row.innerHTML =
                            '<div class="skill-pair">' +
                            '<span class="from-skill">' + pair.fs + '</span>' +
                            '<span class="arrow-icon">→</span>' +
                            '<span class="to-skill">' + pair.ts + '</span>' +
                            '</div>' +
                            '<span class="support-slots">' + slotTags + '</span>';
                        list.appendChild(row);
                    });
                    sec.appendChild(list);
                }

                container.appendChild(sec);
            });

            var matchDesc = matchedCount > 0 ? matchedCount + ' 个部位有匹配' : '无匹配部位';
            document.getElementById('infoNote').textContent = from + ' → ' + to + '：共 ' + displayItems.length +
                ' 个部位，' + matchDesc + '。' + ((fFrom || fTo) ? ' 已隐藏未命中部位。' : '');
        }

        function resetSkillFilter() {
            document.getElementById('skillFrom').value = '';
            document.getElementById('skillTo').value = '';
            calc();
        }
    </script>
</body>
</html>
