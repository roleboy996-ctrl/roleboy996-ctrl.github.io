<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }

        /* ----- 密码锁遮罩层 ----- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.93);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 30px 20px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #lockScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .lock-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 32px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s;
        }
        .lock-box:hover {
            border-color: var(--border-glow);
        }
        .lock-box .lock-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .lock-box h2 {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .lock-box .lock-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .lock-box input {
            width: 100%;
            padding: 14px 18px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: 0.2s;
        }
        .lock-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .lock-box .lock-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            font-family: var(--font-display);
            letter-spacing: 2px;
        }
        .lock-box .lock-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .lock-box .lock-btn:active {
            transform: scale(0.98);
        }
        .lock-box .lock-error {
            color: #f87171;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .lock-box .lock-error.show {
            opacity: 1;
        }

        /* ---- 原有页面样式 ---- */
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(200, 169, 110, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 calc(33% - 20px);
            min-width: 120px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .form-group select option {
            background: #1a212b;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 3px;
            margin-top: 4px;
            font-family: var(--font-display);
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 6px;
        }
        .result-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 14px 10px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
            text-align: center;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .slot-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .result-item .skill-pair {
            font-size: 14px;
            margin: 4px 0;
        }
        .result-item .skill-from {
            color: #f6d365;
        }
        .result-item .skill-to {
            color: #6cb4ee;
        }
        .result-item .arrow {
            color: var(--text-muted);
            font-size: 12px;
            margin: 0 4px;
        }
        .result-item .sub-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .result-item .highlight {
            background: rgba(200, 169, 110, 0.15);
            border-radius: 4px;
            padding: 2px 6px;
            display: inline-block;
        }
        .result-grid-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .summary-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-item .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 2px;
        }
        .summary-item .value.green { color: #5fcb9a; }
        .info-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .back-link:hover {
            color: var(--gold);
        }
        .no-result {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 16px;
            grid-column: 1/-1;
        }
        .no-result .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 640px) {
            .form-group { flex: 1 1 100%; }
            .result-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .result-grid-summary { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 22px; }
            .card { padding: 16px 12px; }
            .lock-box { padding: 28px 20px; }
        }
        @media (max-width: 420px) {
            .result-grid { grid-template-columns: 1fr 1fr; }
            .result-grid-summary { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <div id="resultArea" style="margin-top:20px; display:none;">
                <div class="result-grid-summary" id="summaryGrid">
                    <div class="summary-item">
                        <div class="label">📊 可转换部位</div>
                        <div class="value" id="totalSlots">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🔗 技能匹配</div>
                        <div class="value green" id="totalMatches">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎯 筛选状态</div>
                        <div class="value" id="filterDisplay" style="font-size:14px;">全部</div>
                    </div>
                </div>

                <div class="result-grid" id="slotGrid"></div>

                <div class="info-note" id="infoNote">💡 选择两个职业，可分别筛选当前或目标职业技能，查看恐惧词条转换对应关系。</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑の不灭工具箱</a>
    </div>

    <script>
        // ================================================================
        //  密码锁逻辑（密码：666888）
        // ================================================================

        (function() {
            var CORRECT_PASSWORD = '666888';
            var lockScreen = document.getElementById('lockScreen');
            var lockInput = document.getElementById('lockInput');
            var lockBtn = document.getElementById('lockBtn');
            var lockError = document.getElementById('lockError');

            // 检查 sessionStorage 是否已解锁
            if (sessionStorage.getItem('skill_convert_unlocked') === 'true') {
                lockScreen.classList.add('hidden');
                lockInput.disabled = true;
                return;
            }

            // 解锁函数
            function unlock() {
                var inputVal = lockInput.value.trim();
                if (inputVal === CORRECT_PASSWORD) {
                    sessionStorage.setItem('skill_convert_unlocked', 'true');
                    lockScreen.classList.add('hidden');
                    lockInput.disabled = true;
                    lockError.classList.remove('show');
                } else {
                    lockError.classList.add('show');
                    lockInput.value = '';
                    lockInput.focus();
                    // 抖动效果
                    lockInput.style.borderColor = '#f87171';
                    setTimeout(function() {
                        lockInput.style.borderColor = '';
                    }, 500);
                }
            }

            // 绑定事件
            lockBtn.addEventListener('click', unlock);
            lockInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    unlock();
                }
            });

            // 自动聚焦
            lockInput.focus();
        })();

                '圣教军': '天堂之拳',
                '死灵法师': '亡者之甲',
                '狂骑士': '暗影雾',
                '雾刃': '移形换影',
                '德鲁伊': '自然契约·暴熊',
                '术士': '血之契约'
            },
            '副手_衣服_裤子_2': {
                '法师': '时间延缓',
                '野蛮人': '裂地破',
                '武行者': '回天息',
                '猎魔人': '憎恨',
                '圣教军': '审判',
                '死灵法师': '黑暗诅咒',
                '狂骑士': '暗影注能',
                '雾刃': '海潮吞噬',
                '德鲁伊': '自然契约·树精',
                '术士': '魔血灼煌'
            }
        };

        function getSkillsForClass(cls) {
            var skills = [];
            var seen = {};
            for (var key in RAW_DATA) {
                var skill = RAW_DATA[key][cls];
                if (skill && skill !== '—' && !seen[skill]) {
                    seen[skill] = true;
                    skills.push(skill);
                }
            }
            return skills;
        }

        function buildSlotData(fromCls, toCls, filterFrom, filterTo) {
            var slotMap = {};
            SLOT_NAMES.forEach(function(s) { slotMap[s] = []; });

            for (var key in RAW_DATA) {
                var entry = RAW_DATA[key];
                var fromSkill = entry[fromCls] || '—';
                var toSkill = entry[toCls] || '—';
                if (fromSkill === '—' || toSkill === '—') continue;
                if (filterFrom && fromSkill !== filterFrom) continue;
                if (filterTo && toSkill !== filterTo) continue;

                var parts = key.split('_');
                parts.forEach(function(p) {
                    var slotName = p.replace('_2', '');
                    if (SLOT_NAMES.indexOf(slotName) !== -1) {
                        var exists = slotMap[slotName].some(function(item) {
                            return item.fromSkill === fromSkill && item.toSkill === toSkill;
                        });
                        if (!exists) {
                            slotMap[slotName].push({ fromSkill: fromSkill, toSkill: toSkill });
                        }
                    }
                });
            }
            return slotMap;
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom');
            var toSel = document.getElementById('classTo');
            CLASSES.forEach(function(cls) {
                var opt1 = document.createElement('option');
                opt1.value = cls;
                opt1.textContent = cls;
                fromSel.appendChild(opt1);

                var opt2 = document.createElement('option');
                opt2.value = cls;
                opt2.textContent = cls;
                toSel.appendChild(opt2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateFromSkills();
            updateToSkills();
            calculate();
        };

        function updateFromSkills() {
            var cls = document.getElementById('classFrom').value;
            var sel = document.getElementById('skillFrom');
            var currentVal = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            var skills = getSkillsForClass(cls);
            skills.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                sel.appendChild(opt);
            });
            if (currentVal) {
                var exists = false;
                for (var i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value === currentVal) { exists = true; break; }
                }
                if (exists) sel.value = currentVal;
            }
        }

        function updateToSkills() {
            var cls = document.getElementById('classTo').value;
            var sel = document.getElementById('skillTo');
            var currentVal = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            var skills = getSkillsForClass(cls);
            skills.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                sel.appendChild(opt);
            });
            if (currentVal) {
                var exists = false;
                for (var i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value === currentVal) { exists = true; break; }
                }
                if (exists) sel.value = currentVal;
            }
        }

        function calculate() {
            var fromCls = document.getElementById('classFrom').value;
            var toCls = document.getElementById('classTo').value;
            var filterFrom = document.getElementById('skillFrom').value;
            var filterTo = document.getElementById('skillTo').value;

            if (fromCls === toCls) {
                alert('当前职业和目标职业不能相同！');
                return;
            }

            var slotData = buildSlotData(fromCls, toCls, filterFrom, filterTo);

            var totalSlots = 0;
            var totalMatches = 0;
            var displaySlots = [];
            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                if (items.length > 0) {
                    totalSlots++;
                    totalMatches += items.length;
                    displaySlots.push({ slot: slot, items: items });
                }
            });

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = totalSlots;
            document.getElementById('totalMatches').textContent = totalMatches;

            var filterDisplay = '';
            if (filterFrom && filterTo) filterDisplay = filterFrom + ' → ' + filterTo;
            else if (filterFrom) filterDisplay = '当前: ' + filterFrom;
            else if (filterTo) filterDisplay = '目标: ' + filterTo;
            else filterDisplay = '全部';
            document.getElementById('filterDisplay').textContent = filterDisplay;

            var grid = document.getElementById('slotGrid');
            grid.innerHTML = '';

            if (displaySlots.length === 0) {
                grid.innerHTML = `
                    <div class="no-result">
                        <span class="icon">🔍</span>
                        <div>未找到匹配的技能转换</div>
                        <div style="font-size:13px; margin-top:6px; color:var(--text-muted);">请尝试调整筛选条件或选择其他职业</div>
                    </div>
                `;
                document.getElementById('infoNote').textContent =
                    '💡 ' + fromCls + ' → ' + toCls + '（筛选：' + filterDisplay + '）：未找到可转换的恐惧词条。';
                return;
            }

            displaySlots.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'result-item';
                var html = '<div class="slot-name">' + item.slot + '</div>';
                item.items.forEach(function(pair) {
                    var fromDisplay = pair.fromSkill !== '—' ? pair.fromSkill : '—';
                    var toDisplay = pair.toSkill !== '—' ? pair.toSkill : '—';
                    var isHighlight = (filterFrom && filterTo && pair.fromSkill === filterFrom && pair.toSkill === filterTo);
                    var fromClass = isHighlight ? 'highlight skill-from' : 'skill-from';
                    var toClass = isHighlight ? 'highlight skill-to' : 'skill-to';
                    html += '<div class="skill-pair">';
                    html += '<span class="' + fromClass + '">' + fromDisplay + '</span>';
                    html += '<span class="arrow"> → </span>';
                    html += '<span class="' + toClass + '">' + toDisplay + '</span>';
                    html += '</div>';
                });
                html += '<div class="sub-text">' + item.items.length + ' 个技能</div>';
                div.innerHTML = html;
                grid.appendChild(div);
            });

            document.getElementById('infoNote').textContent =
                '💡 ' + fromCls + ' → ' + toCls + '（筛选：' + filterDisplay + '）：共 ' + totalSlots + ' 个部位，' + totalMatches + ' 个技能可转换。';
        }
    </script>
</body>
</html>
