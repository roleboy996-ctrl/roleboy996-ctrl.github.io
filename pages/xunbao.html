<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽百宝箱 · 寻宝答案</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #07090d;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 820px;
            width: 100%;
        }
        .main-panel {
            position: relative;
            padding: 14px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 16px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 42px rgba(0, 0, 0, 0.32),
                0 18px 54px rgba(0, 0, 0, 0.32);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #26384a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(214, 183, 111, 0.3);
        }
        .header h1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            color: #d6b76f;
            background: none;
            -webkit-text-fill-color: currentColor;
        }
        .header h1 .page-icon {
            width: 22px;
            height: 22px;
            color: #d6b76f;
            flex-shrink: 0;
        }
        .header h1 .title-text {
            background: linear-gradient(135deg, #f0c95a, #d6b76f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }
        .card {
            background: rgba(14, 20, 29, 0.86);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .search-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-row input {
            flex: 1;
            min-width: 160px;
            padding: 8px 12px;
            background: #101922;
            border: 1px solid #26384a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-row input:focus {
            border-color: #d6b76f;
            box-shadow: 0 0 0 2px rgba(214, 183, 111, 0.12);
        }
        .search-row input::placeholder {
            color: #5a6a7e;
        }
        .search-row .btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #d6b76f, #f0c95a);
            border: none;
            border-radius: 8px;
            color: #070a0f;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-row .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 14px rgba(214, 183, 111, 0.18);
        }
        .search-row .btn:active {
            transform: scale(0.97);
        }
        .search-row .btn-reset {
            background: #26384a;
            color: #e0e6ed;
        }
        .search-row .btn-reset:hover {
            background: #34475a;
        }
        .search-note {
            margin-top: 8px;
            color: #7a8a9e;
            font-size: 12px;
            line-height: 1.5;
        }
        .stats {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .stats .item {
            background: rgba(14, 20, 29, 0.86);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 8px;
            padding: 4px 12px;
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .stats .item .l {
            font-size: 9px;
            color: #7a8a9e;
            letter-spacing: 0.3px;
        }
        .stats .item .v {
            font-size: 16px;
            font-weight: 700;
            color: #f0c95a;
        }
        .stats .item .v.g {
            color: #61d6a3;
        }
        .letter-title {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            margin: 2px 0 7px 0;
            padding: 0 8px;
            border-radius: 999px;
            background: rgba(214, 183, 111, 0.12);
            border: 1px solid rgba(214, 183, 111, 0.25);
            color: #f0c95a;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
        }
        .match-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d6b76f;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 0 8px;
            border-bottom: 1px solid #26384a;
            margin-bottom: 8px;
        }
        .match-title::before {
            content: "";
            width: 4px;
            height: 14px;
            border-radius: 999px;
            background: #8f2c2c;
            box-shadow: 0 0 18px rgba(143, 44, 44, 0.46);
            flex-shrink: 0;
        }
        .qa-list {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }
        .qa-item {
            background: rgba(16, 25, 34, 0.96);
            border: 1px solid #26384a;
            border-radius: 8px;
            padding: 10px 12px;
        }
        .qa-item.highlight {
            border-color: #f0c95a;
            background: linear-gradient(90deg, rgba(143, 44, 44, 0.18), rgba(214, 183, 111, 0.09));
            box-shadow: inset 3px 0 0 rgba(143, 44, 44, 0.95), 0 0 14px rgba(143, 44, 44, 0.16);
        }
        .question {
            color: #dce4ec;
            font-size: 14px;
            line-height: 1.55;
        }
        .answer {
            color: #f0c95a;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5;
            margin-top: 5px;
        }
        .answer::before {
            content: "答案：";
            color: #7a8a9e;
            font-size: 12px;
            font-weight: 600;
        }
        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 20px 0;
            font-size: 14px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: fit-content;
            margin: 12px auto 0;
            padding: 6px 12px;
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 999px;
            background: rgba(14, 20, 29, 0.72);
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link::before {
            content: "←";
            color: #d6b76f;
        }
        .back-link:hover {
            border-color: rgba(214, 183, 111, 0.42);
            color: #d6b76f;
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .search-row input {
                font-size: 13px;
                padding: 6px 10px;
                min-width: 120px;
            }
            .search-row .btn {
                font-size: 13px;
                padding: 6px 14px;
            }
            .question {
                font-size: 13px;
            }
            .answer {
                font-size: 14px;
            }
            .main-panel {
                padding: 10px;
                border-radius: 14px;
            }
            .main-panel::before {
                left: 12px;
                right: 12px;
            }
        }
        @media (max-width: 380px) {
            .search-row input {
                min-width: 100%;
            }
            .search-row .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>
                <svg class="page-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor"/>
                    <path d="M14.8 9.2l-1.6 4-4 1.6 1.6-4 4-1.6z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
                    <path d="M12 2.8v2M12 19.2v2M2.8 12h2M19.2 12h2" fill="none" stroke="currentColor" stroke-linecap="round"/>
                </svg>
                <span class="title-text">寻宝答案</span>
            </h1>
            <span class="sub">百宝箱 · 答题查询 · 更新于 2026-06-25</span>
        </div>

        <div class="main-panel">
        <div class="card">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="题目/答案缩写或关键词..." oninput="filterAnswers()">
                <button class="btn" onclick="filterAnswers()">查询</button>
                <button class="btn btn-reset" onclick="resetFilter()">重置</button>
            </div>
            <div class="search-note">支持 1-3 个字母缩写搜索，会区分“题目缩写”和“答案缩写”。</div>
        </div>

        <div class="stats">
            <div class="item"><div class="l">总题目</div><div class="v" id="totalCount">0</div></div>
            <div class="item"><div class="l">当前显示</div><div class="v g" id="showCount">0</div></div>
            <div class="item"><div class="l">匹配分组</div><div class="v" id="letterCount">0</div></div>
        </div>

        <div class="card">
            <div id="resultContainer"></div>
        </div>

        <a href="../index.html" class="back-link">返回百宝箱</a>
        </div>
    </div>

    <script>
        var ANSWER_DATA = [
            { question: '喜欢折磨的痛苦女王', answer: '安达利尔' },
            { question: '这是第一个将恶魔召唤到庇护之地的巫师部族', answer: '费斯利尔' },
            { question: '烈焰地狱中诞生了几位魔王', answer: '7' },
            { question: '地狱中最伟大的将军，罪恶的化身', answer: '阿兹莫丹' },
            { question: '高阶天堂中的天使出生在哪里', answer: '水晶穹顶' },
            { question: '命运卷轴的持有者', answer: '伊斯瑞尔' },
            { question: '我的鬃毛无法保护我，它们总是指向同一个方向', answer: '刷子' },
            { question: '最年长的魔王，怀着满腔憎恨', answer: '墨菲斯托' },
            { question: '我有一只无法用来视物的眼，在勤劳的双手中不停地修补', answer: '针' },
            { question: '毁灭之王，永远处于战争之中', answer: '巴尔' },
            { question: '以下哪位是参与创世的恶魔', answer: '莉莉丝' },
            { question: '希望的化身，深受所有天使的喜爱', answer: '奥利尔' },
            { question: '凯吉安南部覆盖着', answer: '丛林' },
            { question: '勇气天使，世间最强大的战士', answer: '英普瑞斯' },
            { question: '三位魔王中最小的一位，却是最强大的一位', answer: '迪亚波罗' },
            { question: '痛苦之王，也是虫蛆之王', answer: '督瑞尔' },
            { question: '我可以悄无声息地降临，覆盖整片大地', answer: '夜晚' },
            { question: '以下哪位魔神不属于三大魔神', answer: '阿兹莫丹' },
            { question: '行动越多，留下的就越多', answer: '脚步' },
            { question: '它无比脆弱，就连一声叹息都可以打破它', answer: '寂静' },
            { question: '被所有野蛮人崇敬的永恒的领袖', answer: '布尔凯索' },
            { question: '第二代不朽之王叫', answer: '阿卡巴' },
            { question: '谎言之王，永远不可信任，永远笼罩在阴影之中', answer: '彼列' },
            { question: '有湖却无水，有山却无石，有城却无楼', answer: '地图' },
            { question: '活着，却没有气息，像死亡一样冰冷，从来不感到渴，却一直在喝水', answer: '鱼' },
            { question: '正义大天使的武器是', answer: '艾德鲁因' },
            { question: '有多少个月亮照耀着庇护之地', answer: '1' },
            { question: '哪位先祖教会了德鲁伊族处世的法则', answer: '瓦西里' },
            { question: '天使议会的第一位领袖，智慧天使', answer: '马萨伊尔' },
            { question: '帮助人类诞生的天使', answer: '伊纳瑞斯' },
            { question: '有27只棕色的老鼠，18只黑色的老鼠，14只白色的老鼠，一个瞎子必须杀死多少只老鼠，才能保证他杀死的老鼠中有白色的老鼠', answer: '46' },
            { question: '有很多牙齿，却不能啃咬，装扮是我与生俱来的权利', answer: '梳子' },
            { question: '一个铁匠和一个裁缝在玩骰子，他们每局赌上一枚金币，铁匠赢了3局，裁缝赢了5个金币，他们总共玩了多少局', answer: '11' },
            { question: '在庇护之地创建时，天使议会中有多少位天使', answer: '5' },
            { question: '野蛮人杀死了17个战士，法师杀死了18个战士，死灵法师复活了6个死去的战士。地上有多少具尸体', answer: '29' },
            { question: '以下哪一项不是世界之石的名称', answer: '水晶长矛' }
        ];

        var PINYIN_COLLATOR = new Intl.Collator('zh-Hans-u-co-pinyin');
        var PINYIN_BOUNDARIES = [
            ['A', '阿'], ['B', '八'], ['C', '嚓'], ['D', '咑'], ['E', '妸'], ['F', '发'],
            ['G', '旮'], ['H', '哈'], ['J', '讥'], ['K', '咔'], ['L', '垃'], ['M', '妈'],
            ['N', '拏'], ['O', '噢'], ['P', '妑'], ['Q', '七'], ['R', '呥'], ['S', '仨'],
            ['T', '他'], ['W', '哇'], ['X', '夕'], ['Y', '丫'], ['Z', '帀']
        ];

        var currentKeyword = '';

        function getInitial(text) {
            var first = (text || '').trim().charAt(0);
            if (!first) return '#';
            var upper = first.toUpperCase();
            if (upper >= 'A' && upper <= 'Z') return upper;

            var initial = '#';
            for (var i = 0; i < PINYIN_BOUNDARIES.length; i++) {
                if (PINYIN_COLLATOR.compare(first, PINYIN_BOUNDARIES[i][1]) >= 0) {
                    initial = PINYIN_BOUNDARIES[i][0];
                } else {
                    break;
                }
            }
            return initial;
        }

        function getInitials(text, maxLen) {
            var initials = '';
            var chars = Array.from(text || '');
            for (var i = 0; i < chars.length && initials.length < maxLen; i++) {
                var ch = chars[i].trim();
                if (!ch || /[，。！？、：；（）()《》“”"'\s]/.test(ch)) continue;
                initials += getInitial(ch);
            }
            return initials.toLowerCase();
        }

        function sortAnswers(a, b) {
            var ia = getInitial(a.question);
            var ib = getInitial(b.question);
            if (ia !== ib) return ia.localeCompare(ib);
            return PINYIN_COLLATOR.compare(a.question, b.question);
        }

        function escapeHtml(text) {
            return String(text).replace(/[&<>"']/g, function(ch) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[ch];
            });
        }

        function matchesKeyword(item, keyword) {
            if (!keyword) return true;
            var question = item.question.toLowerCase();
            var answer = item.answer.toLowerCase();
            return question.indexOf(keyword) !== -1 ||
                answer.indexOf(keyword) !== -1 ||
                (isInitialSearch(keyword) && getInitials(item.question, keyword.length) === keyword) ||
                (isInitialSearch(keyword) && getInitials(item.answer, keyword.length) === keyword);
        }

        function isInitialSearch(keyword) {
            return /^[a-z]{1,3}$/.test(keyword);
        }

        function getMatchTitle(type, keyword, count) {
            var text = keyword.length === 1 ? '首字母 ' : '缩写 ';
            return type + text + keyword.toUpperCase() + '（' + count + ' 条）';
        }

        function renderItems(items) {
            var html = '<div class="qa-list">';
            items.sort(sortAnswers).forEach(function(item) {
                var highlight = currentKeyword && matchesKeyword(item, currentKeyword) ? ' highlight' : '';
                html += '<div class="qa-item' + highlight + '">';
                html += '<div class="question">' + escapeHtml(item.question) + '</div>';
                html += '<div class="answer">' + escapeHtml(item.answer) + '</div>';
                html += '</div>';
            });
            html += '</div>';
            return html;
        }

        function render(data) {
            var container = document.getElementById('resultContainer');
            var totalCount = document.getElementById('totalCount');
            var showCount = document.getElementById('showCount');
            var letterCount = document.getElementById('letterCount');

            totalCount.textContent = ANSWER_DATA.length;
            showCount.textContent = data.length;

            if (data.length === 0) {
                letterCount.textContent = 0;
                container.innerHTML = '<div class="no-result">未找到匹配的题目</div>';
                return;
            }

            if (isInitialSearch(currentKeyword)) {
                var searchText = currentKeyword.toUpperCase();
                var questionMatches = data.filter(function(item) {
                    return getInitials(item.question, currentKeyword.length) === currentKeyword;
                });
                var answerMatches = data.filter(function(item) {
                    return getInitials(item.answer, currentKeyword.length) === currentKeyword &&
                        getInitials(item.question, currentKeyword.length) !== currentKeyword;
                });
                var groupCount = (questionMatches.length ? 1 : 0) + (answerMatches.length ? 1 : 0);
                var letterHtml = '';

                letterCount.textContent = groupCount;
                if (questionMatches.length) {
                    letterHtml += '<div class="match-title">' + getMatchTitle('题目', searchText, questionMatches.length) + '</div>';
                    letterHtml += renderItems(questionMatches);
                }
                if (answerMatches.length) {
                    letterHtml += '<div class="match-title">' + getMatchTitle('答案', searchText, answerMatches.length) + '</div>';
                    letterHtml += renderItems(answerMatches);
                }
                container.innerHTML = letterHtml;
                return;
            }

            var grouped = {};
            data.sort(sortAnswers).forEach(function(item) {
                var initial = getInitial(item.question);
                if (!grouped[initial]) grouped[initial] = [];
                grouped[initial].push(item);
            });

            var letters = Object.keys(grouped).sort();
            letterCount.textContent = letters.length;

            var html = '';
            letters.forEach(function(initial) {
                html += '<div class="letter-title">' + initial + '</div>';
                html += renderItems(grouped[initial]);
            });

            container.innerHTML = html;
        }

        function filterAnswers() {
            var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            currentKeyword = keyword;
            render(ANSWER_DATA.filter(function(item) {
                return matchesKeyword(item, keyword);
            }));
        }

        function resetFilter() {
            document.getElementById('searchInput').value = '';
            currentKeyword = '';
            render(ANSWER_DATA.slice());
        }

        window.onload = function() {
            render(ANSWER_DATA.slice());
        };
    </script>
</body>
</html>
