<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑の不灭 · 工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: 
                linear-gradient(rgba(10, 14, 20, 0.75), rgba(10, 14, 20, 0.85)),
                url('images/beijingtu.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }

        /* ----- 头部：Logo居中放大，品牌名缩小在下方 ----- */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }
        .header .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }
        .header .logo-wrapper .game-logo {
            height: 100px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(200, 169, 110, 0.20));
        }
        .header .brand-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(200, 169, 110, 0.10);
        }
        .header .sub-title {
            color: #7a8a9e;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 4px;
            border-top: 1px solid rgba(30, 44, 56, 0.6);
            padding-top: 10px;
        }

        /* ----- 工具卡片网格 ----- */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }
        .tool-card {
            display: block;
            padding: 20px 18px;
            background: rgba(20, 25, 35, 0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(42, 58, 74, 0.6);
            border-radius: 16px;
            color: #e0e6ed;
            text-decoration: none;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .tool-card:hover {
            border-color: #c8a96e;
            background: rgba(200, 169, 110, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .tool-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 6px;
        }
        .tool-card .name {
            font-size: 17px;
            font-weight: 600;
            display: block;
            letter-spacing: 0.5px;
        }
        .tool-card .desc {
            font-size: 13px;
            color: #6a7a8e;
            margin-top: 4px;
            display: block;
        }
        .tool-card .badge {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 10px;
            background: rgba(200, 169, 110, 0.15);
            color: #c8a96e;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 110, 0.15);
            letter-spacing: 0.5px;
        }
        .tool-card.full {
            grid-column: 1 / -1;
            text-align: center;
            padding: 22px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .tool-card.full .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            flex-shrink: 0;
            object-fit: cover;
        }
        .tool-card.full .info {
            text-align: left;
        }
        .tool-card.full .info .name {
            font-size: 17px;
            font-weight: 600;
        }
        .tool-card.full .info .desc {
            font-size: 13px;
            color: #6a7a8e;
        }

        .footer {
            text-align: center;
            border-top: 1px solid rgba(30, 44, 56, 0.6);
            padding-top: 20px;
            margin-top: 6px;
        }
        .footer p {
            color: #4a5a6e;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .footer a {
            color: #6a7a8e;
            text-decoration: none;
            transition: 0.2s;
        }
        .footer a:hover {
            color: #c8a96e;
        }

        @media (max-width: 520px) {
            .tool-grid { grid-template-columns: 1fr; }
            .header .logo-wrapper .game-logo { height: 72px; }
            .header .brand-name { font-size: 18px; }
            .tool-card .badge { position: static; display: inline-block; margin-top: 6px; }
            .tool-card.full { flex-direction: column; text-align: center; }
            .tool-card.full .info { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部：Logo居中放大，品牌名缩小 -->
        <div class="header">
            <div class="logo-wrapper">
                <img src="images/logo.png" alt="暗黑不朽" class="game-logo">
            </div>
            <div class="brand-name">暗黑の不灭</div>
            <div class="sub-title">— 暗黑不朽数据工具箱 —</div>
        </div>

        <div class="tool-grid">
            <a href="pages/xiaobaoshi999.html" class="tool-card">
                <span class="icon">💎</span>
                <span class="name">小宝石升级计算器</span>
                <span class="desc">消耗 &amp; 白金币模拟</span>
                <span class="badge">推荐</span>
            </a>
            <a href="pages/chuanqi999.html" class="tool-card">
                <span class="icon">⭐</span>
                <span class="name">传奇宝石升级计算器</span>
                <span class="desc">一星 / 二星 / 五星</span>
                <span class="badge">热门</span>
            </a>
            <a href="pages/xiashuidao999.html" class="tool-card">
                <span class="icon">🏛️</span>
                <span class="name">赫拉迪姆遗志计算器</span>
                <span class="desc">三种材料独立计算 · 天数模拟</span>
                <span class="badge">新</span>
            </a>
            <a href="pages/baoshi.html" class="tool-card">
                <span class="icon">🔮</span>
                <span class="name">宝石合成计算器</span>
                <span class="desc">快速计算合成所需数量</span>
            </a>
            <a href="pages/skill_convert.html" class="tool-card">
                <span class="icon">🔄</span>
                <span class="name">恐惧词条转换</span>
                <span class="desc">职业技能 · 部位映射</span>
                <span class="badge">新</span>
            </a>
            <a href="https://www.douyin.com/" target="_blank" class="tool-card full" style="border-color: rgba(30, 44, 56, 0.6);">
                <img src="images/douyintouxiang.png" alt="抖音头像" class="avatar">
                <div class="info">
                    <span class="name">关注抖音：暗黑の不灭</span>
                    <span class="desc">获取更多暗黑不朽攻略 &amp; 工具更新</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>
                数据仅供参考 · 以游戏内为准 &nbsp;|&nbsp;
                <a href="https://bumie666.github.io" target="_blank">bumie666.github.io</a>
            </p>
        </div>
    </div>
</body>
</html>
