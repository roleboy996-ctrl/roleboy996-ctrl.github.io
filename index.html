<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑不朽百宝箱 · 工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #07090d;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(44, 58, 73, 0.46) 0%, rgba(7, 9, 13, 0) 62%),
                linear-gradient(180deg, #0b1118 0%, #07090d 100%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 42px 20px 30px;
        }
        .container {
            max-width: 920px;
            width: 100%;
        }

        /* ----- 头部 ----- */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header .main-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 2px 30px rgba(214, 183, 111, 0.10);
            margin-bottom: 6px;
        }
        .header .title-mark {
            width: 38px;
            height: 38px;
            color: #d6b76f;
            filter: drop-shadow(0 8px 24px rgba(214, 183, 111, 0.16));
        }
        .header .title-text {
            background: linear-gradient(135deg, #f0c95a, #d6b76f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .brand-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #a6b2c0;
            margin-top: 2px;
        }
        .header .sub-title {
            color: #76869a;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 6px;
            border-top: 1px solid rgba(51, 63, 76, 0.62);
            padding-top: 10px;
        }

        /* ----- 工具卡片网格 ----- */
        .main-panel {
            position: relative;
            padding: 22px;
            border: 1px solid rgba(73, 86, 100, 0.52);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(17, 24, 34, 0.86), rgba(8, 12, 18, 0.72)),
                rgba(8, 12, 18, 0.84);
            box-shadow:
                inset 0 1px 0 rgba(214, 183, 111, 0.08),
                inset 0 0 48px rgba(0, 0, 0, 0.34),
                0 24px 70px rgba(0, 0, 0, 0.34);
            overflow: hidden;
        }
        .main-panel::before {
            content: "";
            position: absolute;
            left: 22px;
            right: 22px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(143, 44, 44, 0.86), rgba(214, 183, 111, 0.58), transparent);
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d6b76f;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0 0 10px;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 14px;
            border-radius: 999px;
            background: #8f2c2c;
            box-shadow: 0 0 18px rgba(143, 44, 44, 0.46);
        }
        .feature-grid,
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .feature-grid { margin-bottom: 22px; }
        .tool-grid { grid-template-columns: repeat(6, 1fr); }
        .tool-card {
            display: block;
            padding: 20px 18px;
            min-height: 134px;
            background: rgba(14, 20, 29, 0.86);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(52, 71, 90, 0.72);
            border-radius: 12px;
            color: #e0e6ed;
            text-decoration: none;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .tool-card::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: -45%;
            width: 34%;
            background: linear-gradient(90deg, transparent, rgba(214, 183, 111, 0.13), transparent);
            opacity: 0;
            transform: skewX(-14deg);
            transition: left 0.42s ease, opacity 0.25s ease;
            pointer-events: none;
        }
        .tool-card:hover {
            border-color: #d6b76f;
            background: rgba(20, 26, 35, 0.94);
            transform: translateY(-3px);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.38);
        }
        .tool-card:hover::after {
            left: 110%;
            opacity: 1;
        }
        .tool-grid .tool-card {
            grid-column: span 2;
        }
        .tool-grid .tool-card.wide {
            grid-column: span 3;
        }
        .tool-card .icon {
            display: block;
            width: 32px;
            height: 32px;
            margin-bottom: 14px;
            color: #b7c2cf;
            stroke-width: 1.7;
            transition: color 0.25s ease, filter 0.25s ease, transform 0.25s ease;
        }
        .tool-card:hover .icon {
            color: #d6b76f;
            filter: drop-shadow(0 0 14px rgba(214, 183, 111, 0.22));
            transform: translateY(-1px);
        }
        .tool-card .name {
            font-size: 17px;
            font-weight: 600;
            display: block;
            letter-spacing: 0.5px;
        }
        .tool-card .desc {
            font-size: 13px;
            color: #6a7a8e;
            margin-top: 4px;
            display: block;
        }
        .tool-card.feature {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 168px;
            padding: 34px 22px 24px;
            border-color: rgba(214, 183, 111, 0.28);
            background:
                linear-gradient(90deg, rgba(143, 44, 44, 0.18), rgba(143, 44, 44, 0) 34%),
                rgba(14, 20, 29, 0.9);
        }
        .tool-card.feature::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 3px;
            border-radius: 0 999px 999px 0;
            background: #8f2c2c;
            box-shadow: 0 0 0 rgba(143, 44, 44, 0);
            transition: box-shadow 0.25s ease, background 0.25s ease;
        }
        .tool-card.feature:hover::before {
            background: #b13a34;
            box-shadow: 0 0 22px rgba(177, 58, 52, 0.42);
        }
        .tool-card.feature .icon {
            width: 36px;
            height: 36px;
            margin-bottom: 0;
        }
        .tool-card.feature .name {
            font-size: 20px;
        }
        .tool-card.feature .desc {
            color: #8d9aac;
        }
        .feature-main {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }
        .feature-text {
            min-width: 0;
        }
        .feature-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 7px;
            flex-shrink: 0;
        }
        .feature-meta span {
            min-width: 92px;
            padding: 4px 10px;
            border: 1px solid rgba(214, 183, 111, 0.16);
            border-radius: 999px;
            background: rgba(214, 183, 111, 0.06);
            color: #aeb8c6;
            font-size: 11px;
            line-height: 1.2;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .tool-card .badge {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 10px;
            background: rgba(129, 105, 68, 0.18);
            color: #bda36c;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(129, 105, 68, 0.28);
            letter-spacing: 0.5px;
        }
        .tool-card .badge.recommend,
        .tool-card .badge.hot {
            background: rgba(214, 183, 111, 0.15);
            color: #d6b76f;
            border-color: rgba(214, 183, 111, 0.20);
        }
        .tool-card .badge.primary {
            background: rgba(143, 44, 44, 0.2);
            color: #e2b0a5;
            border-color: rgba(143, 44, 44, 0.42);
        }
        .tool-card .badge.new {
            background: rgba(129, 105, 68, 0.16);
            color: #a99365;
            border-color: rgba(129, 105, 68, 0.28);
        }
        .tool-card.full {
            margin-top: 22px;
            text-align: center;
            padding: 18px;
            min-height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-color: rgba(52, 71, 90, 0.58);
        }
        .tool-card.full .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(214, 183, 111, 0.3);
            flex-shrink: 0;
            object-fit: cover;
        }
        .tool-card.full .info {
            text-align: left;
        }
        .tool-card.full .info .name {
            font-size: 17px;
            font-weight: 600;
        }
        .tool-card.full .info .desc {
            font-size: 13px;
            color: #6a7a8e;
        }

        .footer {
            text-align: center;
            border-top: 1px solid rgba(51, 63, 76, 0.62);
            padding-top: 20px;
            margin-top: 22px;
        }
        .footer p {
            color: #4a5a6e;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .footer a {
            color: #6a7a8e;
            text-decoration: none;
            transition: 0.2s;
        }
        .footer a:hover {
            color: #d6b76f;
        }

        @media (max-width: 520px) {
            body { padding: 28px 16px 24px; }
            .container { max-width: 420px; }
            .main-panel { padding: 16px; border-radius: 14px; }
            .main-panel::before { left: 16px; right: 16px; }
            .feature-grid,
            .tool-grid { grid-template-columns: 1fr; }
            .header .main-title { font-size: 28px; }
            .header .title-mark { width: 30px; height: 30px; }
            .header .brand-name { font-size: 14px; }
            .header .sub-title { font-size: 11px; }
            .tool-card,
            .tool-card.feature { min-height: auto; }
            .tool-card.feature {
                align-items: flex-start;
                flex-direction: column;
                padding: 20px 18px;
            }
            .feature-meta {
                align-items: flex-start;
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
            }
            .feature-meta span {
                min-width: 0;
            }
            .tool-card,
            .tool-grid .tool-card,
            .tool-grid .tool-card.wide { grid-column: auto; }
            .tool-card .badge { position: static; display: inline-block; margin-top: 6px; }
            .tool-card.full { flex-direction: column; text-align: center; }
            .tool-card.full .info { text-align: center; }
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true" focusable="false">

    </svg>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="main-title">
                <svg class="title-mark" aria-hidden="true"><use href="#icon-swords"></use></svg>
                <span class="title-text">暗黑不朽百宝箱</span>
            </div>
            <div class="brand-name">短脖子乔治</div>
            <div class="sub-title">— 暗黑不朽数据工具箱 —</div>
        </div>

        <div class="main-panel">
            <div class="section">
                <div class="section-title">常用查询</div>
                <div class="feature-grid">
                    <!-- 魔法词条转换 -->
                    <a href="pages/skill_convert.html" class="tool-card feature">
                        <span class="feature-main">
                            <svg class="icon" aria-hidden="true"><use href="#icon-magic"></use></svg>
                            <span class="feature-text">
                                <span class="name">魔法词条转换</span>
                                <span class="desc">职业技能 · 部位映射</span>
                            </span>
                        </span>
                        <span class="feature-meta">
                            <span>职业映射</span>
                            <span>快速查询</span>
                        </span>
                        <span class="badge primary">常用</span>
                    </a>

                    <!-- 寻宝答案 -->
                    <a href="pages/xunbao.html" class="tool-card feature">
                        <span class="feature-main">
                            <svg class="icon" aria-hidden="true"><use href="#icon-compass"></use></svg>
                            <span class="feature-text">
                                <span class="name">寻宝答案</span>
                                <span class="desc">题目 / 答案首字母快速查询</span>
                            </span>
                        </span>
                        <span class="feature-meta">
                            <span>题目首字母</span>
                            <span>答案首字母</span>
                        </span>
                        <span class="badge primary">常用</span>
                    </a>
                </div>
            </div>

            <div class="section">
                <div class="section-title">计算与资料</div>
                <div class="tool-grid">
                    <!-- 小宝石升级 -->
                    <a href="pages/xiaobaoshi999.html" class="tool-card">
                        <svg class="icon" aria-hidden="true"><use href="#icon-gem"></use></svg>
                        <span class="name">小宝石升级计算器</span>
                        <span class="desc">消耗 &amp; 白金币模拟</span>
                        <span class="badge recommend">推荐</span>
                    </a>

                    <!-- 传奇宝石消耗计算 -->
                    <a href="pages/chuanqi999.html" class="tool-card">
                        <svg class="icon" aria-hidden="true"><use href="#icon-star"></use></svg>
                        <span class="name">传奇宝石消耗计算</span>
                        <span class="desc">一星 / 二星 / 五星</span>
                        <span class="badge hot">热门</span>
                    </a>

                    <!-- 赫拉迪姆遗志 -->
                    <a href="pages/xiashuidao999.html" class="tool-card">
                        <svg class="icon" aria-hidden="true"><use href="#icon-temple"></use></svg>
                        <span class="name">赫拉迪姆遗志计算器</span>
                        <span class="desc">三种材料独立计算 · 天数模拟</span>
                        <span class="badge new">新</span>
                    </a>

                    <!-- 服务器互通查询 -->
                    <a href="pages/fuwuqi.html" class="tool-card wide">
                        <svg class="icon" aria-hidden="true"><use href="#icon-server"></use></svg>
                        <span class="name">服务器互通查询</span>
                        <span class="desc">首字母搜索 · 互通状态查询</span>
                        <span class="badge new">新</span>
                    </a>

                    <!-- 各职业技能词条一览图 -->
                    <a href="pages/jinengcitiao.html" class="tool-card wide">
                        <svg class="icon" aria-hidden="true"><use href="#icon-scroll"></use></svg>
                        <span class="name">各职业技能词条一览图</span>
                        <span class="desc">全职业词条汇总 · 一键查阅</span>
                        <span class="badge new">新</span>
                    </a>
                </div>
            </div>

            <!-- 关注抖音 -->
            <div class="tool-card full">
                <img src="images/douyintouxiang.png" alt="抖音头像" class="avatar">
                <div class="info">
                    <span class="name">关注抖音：短脖子乔治</span>
                    <span class="desc">获取更多暗黑不朽攻略 &amp; 工具更新</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>
                数据仅供参考 · 以游戏内为准 &nbsp;|&nbsp;
            </p>
        </div>
    </div>
</body>
</html>
